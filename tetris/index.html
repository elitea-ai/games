<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Tetris — ELITEA Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;position:fixed;width:100%}
body{height:100%;height:100dvh;overflow:hidden;font-family:'Press Start 2P',monospace;background:#0a0a0a;color:#e0e0e0;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;overscroll-behavior:none}
.app{display:flex;flex-direction:column;height:100%;height:100dvh;overflow:hidden}
.top-bar{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#111;border-bottom:2px solid #333;flex-shrink:0;min-height:44px}
.top-bar .stat{text-align:center;flex:1}
.top-bar .stat-label{font-size:7px;color:#666;text-transform:uppercase;letter-spacing:1px}
.top-bar .stat-value{font-size:14px;color:#0ff;text-shadow:0 0 8px rgba(0,255,255,.6);margin-top:2px}
.top-bar .next-box{display:flex;align-items:center;gap:6px}
.top-bar .next-box canvas{border:1px solid #333;border-radius:2px;background:#0a0a0a}
.pause-btn{background:none;border:1px solid #444;color:#888;font-family:inherit;font-size:8px;padding:4px 8px;border-radius:4px;cursor:pointer}
.pause-btn:active{background:#222}
.game-area{flex:1;display:flex;justify-content:center;align-items:center;position:relative;overflow:hidden;min-height:0}
.screen{position:relative;display:inline-block;border:3px solid #222;border-radius:8px;box-shadow:0 0 20px rgba(0,255,255,.15),inset 0 0 30px rgba(0,0,0,.5);overflow:hidden}
.screen canvas{display:block}
.screen::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none;z-index:2}
.overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(5,5,15,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:5;padding:16px}
.overlay.hidden{display:none}
.overlay h2{font-size:16px;color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #0ff;text-align:center}
.overlay .subtitle{font-size:8px;color:#666;text-align:center}
.overlay .final-score{font-size:10px;color:#ff0;text-shadow:0 0 10px rgba(255,255,0,.5)}
.diff-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;width:100%;max-width:260px}
.diff-btn{font-family:inherit;font-size:7px;padding:10px 6px;background:#1a1a2e;border:2px solid #333;border-radius:6px;color:#aaa;cursor:pointer;text-align:center;transition:all .15s}
.diff-btn.active{border-color:#0ff;color:#0ff;background:#0a1a2a;box-shadow:0 0 10px rgba(0,255,255,.2)}
.diff-btn:active{transform:scale(.95)}
.start-btn{font-family:inherit;font-size:10px;padding:12px 24px;background:linear-gradient(180deg,#00e5ff,#0091ea);border:none;border-radius:6px;color:#000;cursor:pointer;font-weight:bold;text-shadow:none;box-shadow:0 0 20px rgba(0,229,255,.4);margin-top:4px}
.start-btn:active{transform:scale(.95);opacity:.9}
.controls{flex-shrink:0;padding:8px 12px 12px;background:#0d0d0d;border-top:2px solid #222;display:flex;flex-direction:column;gap:6px;align-items:center}
.ctrl-row{display:flex;gap:8px;justify-content:center}
.ctrl-btn{width:60px;height:50px;border-radius:10px;background:#1a1a2e;border:2px solid #2a2a4a;color:#888;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .1s}
.ctrl-btn:active{background:#2a1a4a;border-color:#7b2ff7;color:#fff;transform:scale(.93)}
.ctrl-btn.wide{width:132px;font-family:'Press Start 2P',monospace;font-size:9px;color:#ff0;letter-spacing:1px}
.ctrl-btn.rotate-btn{width:56px;height:44px;font-size:18px;border-color:#444}
@media(min-width:701px){.controls{display:none}.app{justify-content:center;align-items:center}}
@media(max-width:700px){.top-bar .stat-value{font-size:12px}}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Level</div><div class="stat-value" id="level">1</div></div>
    <div class="stat"><div class="stat-label">Lines</div><div class="stat-value" id="lines">0</div></div>
    <div class="next-box"><canvas id="next-canvas"></canvas></div>
    <button class="pause-btn" id="pause-btn">❚❚</button>
  </div>
  <div class="game-area" id="game-area">
    <div class="screen" id="screen-wrap">
      <canvas id="game-canvas"></canvas>
      <div class="overlay" id="start-overlay">
        <h2>🕹️ TETRIS</h2>
        <div class="diff-grid" id="difficulty">
          <button class="diff-btn active" data-level="1">EASY<br><span style="font-size:6px;color:#666">LVL 1</span></button>
          <button class="diff-btn" data-level="5">MEDIUM<br><span style="font-size:6px;color:#666">LVL 5</span></button>
          <button class="diff-btn" data-level="10">HARD<br><span style="font-size:6px;color:#666">LVL 10</span></button>
          <button class="diff-btn" data-level="15">INSANE<br><span style="font-size:6px;color:#666">LVL 15</span></button>
        </div>
        <button class="start-btn" id="start-btn">INSERT COIN</button>
        <div class="subtitle">Swipe or use buttons to play</div>
      </div>
      <div class="overlay hidden" id="gameover-overlay">
        <h2>GAME OVER</h2>
        <div class="final-score" id="final-score"></div>
        <button class="start-btn" id="restart-btn">CONTINUE?</button>
      </div>
      <div class="overlay hidden" id="pause-overlay">
        <h2>PAUSED</h2>
        <button class="start-btn" id="resume-btn">RESUME</button>
      </div>
    </div>
  </div>
  <div class="controls" id="touch-controls">
    <div class="ctrl-row"><div class="ctrl-btn rotate-btn" data-action="rotate">↻</div></div>
    <div class="ctrl-row">
      <div class="ctrl-btn" data-action="left">◀</div>
      <div class="ctrl-btn" data-action="down">▼</div>
      <div class="ctrl-btn" data-action="right">▶</div>
    </div>
    <div class="ctrl-row"><div class="ctrl-btn wide" data-action="drop">DROP</div></div>
  </div>
</div>
<script>
(()=>{
'use strict';
const COLS=10,ROWS=20;
const COLORS={I:'#00e5ff',O:'#ffd600',T:'#ce93d8',S:'#69f0ae',Z:'#ff5252',J:'#448aff',L:'#ff9100'};
const GHOST_ALPHA=0.15;
const SHAPES={
  I:[[0,0],[1,0],[2,0],[3,0]],O:[[0,0],[1,0],[0,1],[1,1]],
  T:[[0,0],[1,0],[2,0],[1,1]],S:[[1,0],[2,0],[0,1],[1,1]],
  Z:[[0,0],[1,0],[1,1],[2,1]],J:[[0,0],[0,1],[1,1],[2,1]],
  L:[[2,0],[0,1],[1,1],[2,1]]
};
const PIECE_NAMES=Object.keys(SHAPES);
const LINE_POINTS=[0,100,300,500,800];
const LINES_PER_LEVEL=10;
function dropInterval(lv){return Math.max(50,800-(lv-1)*50)}
let board,current,next,score,linesCount,level,startLevel;
let gameState='idle',dropTimer=0,lastTime=0,bag=[],BLOCK=28;
const canvas=document.getElementById('game-canvas');
const ctx=canvas.getContext('2d');
const nextCv=document.getElementById('next-canvas');
const nextCtx=nextCv.getContext('2d');
function sizeCanvas(){
  const ga=document.getElementById('game-area');
  const aH=ga.clientHeight-16,aW=ga.clientWidth-16;
  BLOCK=Math.max(14,Math.min(Math.floor(aH/ROWS),Math.floor(aW/COLS)));
  const w=COLS*BLOCK,h=ROWS*BLOCK,dpr=window.devicePixelRatio||1;
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const nb=Math.max(12,Math.floor(BLOCK*0.6));
  nextCv.width=4*nb*dpr;nextCv.height=4*nb*dpr;
  nextCv.style.width=(4*nb)+'px';nextCv.style.height=(4*nb)+'px';
  nextCtx.setTransform(dpr,0,0,dpr,0,0);
  nextCv._bs=nb;draw();drawNext();
}
window.addEventListener('resize',sizeCanvas);
function createBoard(){return Array.from({length:ROWS},()=>Array(COLS).fill(null))}
function refillBag(){
  const a=[...PIECE_NAMES];
  for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}
  bag.push(...a);
}
function nextPieceName(){if(bag.length<2)refillBag();return bag.shift()}
function makePiece(name){return{name,cells:SHAPES[name].map(([x,y])=>[x,y]),x:(COLS/2|0)-2,y:0}}
function rotatedCells(cells){
  let mnX=9,mnY=9,mxX=-1,mxY=-1;
  for(const[x,y]of cells){mnX=Math.min(mnX,x);mnY=Math.min(mnY,y);mxX=Math.max(mxX,x);mxY=Math.max(mxY,y)}
  const cx=(mnX+mxX)/2,cy=(mnY+mxY)/2;
  return cells.map(([x,y])=>[Math.round(cx+(y-cy)),Math.round(cy-(x-cx))]);
}
function valid(cells,px,py){
  for(const[cx,cy]of cells){
    const nx=px+cx,ny=py+cy;
    if(nx<0||nx>=COLS||ny>=ROWS)return false;
    if(ny>=0&&board[ny][nx])return false;
  }return true;
}
function tryRotate(piece){
  const nc=rotatedCells(piece.cells);
  for(const dx of[0,-1,1,-2,2])for(const dy of[0,-1,-2])
    if(valid(nc,piece.x+dx,piece.y+dy)){piece.cells=nc;piece.x+=dx;piece.y+=dy;return true}
  return false;
}
function lockPiece(p){
  for(const[cx,cy]of p.cells){
    const ny=p.y+cy,nx=p.x+cx;
    if(ny<0){gameOver();return}
    board[ny][nx]=p.name;
  }clearLines();
}
function clearLines(){
  let cl=0;
  for(let r=ROWS-1;r>=0;r--){
    if(board[r].every(c=>c!==null)){board.splice(r,1);board.unshift(Array(COLS).fill(null));cl++;r++}
  }
  if(cl>0){
    linesCount+=cl;score+=LINE_POINTS[Math.min(cl,4)]*level;
    const nl=startLevel+Math.floor(linesCount/LINES_PER_LEVEL);
    if(nl>level)level=nl;updateUI();
  }
}
function ghostY(p){let gy=p.y;while(valid(p.cells,p.x,gy+1))gy++;return gy}
function drawBlock(c,x,y,color,sz,alpha=1){
  const g=1;c.globalAlpha=alpha;
  c.fillStyle=color;c.fillRect(x*sz+g,y*sz+g,sz-g*2,sz-g*2);
  c.fillStyle='rgba(255,255,255,0.12)';c.fillRect(x*sz+g,y*sz+g,sz-g*2,2);
  c.globalAlpha=1;
}
function draw(){
  const w=COLS*BLOCK,h=ROWS*BLOCK;ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=0.5;
  for(let x=1;x<COLS;x++){ctx.beginPath();ctx.moveTo(x*BLOCK,0);ctx.lineTo(x*BLOCK,h);ctx.stroke()}
  for(let y=1;y<ROWS;y++){ctx.beginPath();ctx.moveTo(0,y*BLOCK);ctx.lineTo(w,y*BLOCK);ctx.stroke()}
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board&&board[r][c])drawBlock(ctx,c,r,COLORS[board[r][c]],BLOCK);
  if(current&&gameState==='playing'){
    const gy=ghostY(current);
    for(const[cx,cy]of current.cells)drawBlock(ctx,current.x+cx,gy+cy,COLORS[current.name],BLOCK,GHOST_ALPHA);
    for(const[cx,cy]of current.cells)if(current.y+cy>=0)drawBlock(ctx,current.x+cx,current.y+cy,COLORS[current.name],BLOCK);
  }
}
function drawNext(){
  if(!nextCv._bs)return;const bs=nextCv._bs;
  nextCtx.clearRect(0,0,4*bs,4*bs);if(!next)return;
  const cells=SHAPES[next];
  let mnX=4,mxX=0,mnY=4,mxY=0;
  for(const[x,y]of cells){mnX=Math.min(mnX,x);mxX=Math.max(mxX,x);mnY=Math.min(mnY,y);mxY=Math.max(mxY,y)}
  const pw=mxX-mnX+1,ph=mxY-mnY+1,ox=(4-pw)/2-mnX,oy=(4-ph)/2-mnY;
  for(const[x,y]of cells)drawBlock(nextCtx,x+ox,y+oy,COLORS[next],bs);
}
const scoreEl=document.getElementById('score'),levelEl=document.getElementById('level'),linesEl=document.getElementById('lines');
function updateUI(){scoreEl.textContent=score;levelEl.textContent=level;linesEl.textContent=linesCount}
const startOv=document.getElementById('start-overlay'),goOv=document.getElementById('gameover-overlay'),pauseOv=document.getElementById('pause-overlay');
const finalScoreEl=document.getElementById('final-score');
function showOv(el){el.classList.remove('hidden')}
function hideOv(el){el.classList.add('hidden')}
let selectedLevel=1;
document.getElementById('difficulty').addEventListener('click',e=>{
  const b=e.target.closest('[data-level]');if(!b)return;
  document.querySelectorAll('.diff-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');selectedLevel=+b.dataset.level;
});
function startGame(){
  board=createBoard();bag=[];score=0;linesCount=0;
  startLevel=selectedLevel;level=startLevel;
  current=makePiece(nextPieceName());next=nextPieceName();
  gameState='playing';dropTimer=0;lastTime=performance.now();
  updateUI();drawNext();
  hideOv(startOv);hideOv(goOv);hideOv(pauseOv);
  requestAnimationFrame(gameLoop);
}
function gameOver(){
  gameState='over';
  finalScoreEl.textContent='SCORE: '+score+' | LVL: '+level+' | LINES: '+linesCount;
  showOv(goOv);
}
function togglePause(){
  if(gameState==='playing'){gameState='paused';showOv(pauseOv)}
  else if(gameState==='paused'){gameState='playing';lastTime=performance.now();hideOv(pauseOv);requestAnimationFrame(gameLoop)}
}
function spawnNext(){
  current=makePiece(next);next=nextPieceName();drawNext();
  if(!valid(current.cells,current.x,current.y))gameOver();
}
function moveLeft(){if(current&&valid(current.cells,current.x-1,current.y))current.x--}
function moveRight(){if(current&&valid(current.cells,current.x+1,current.y))current.x++}
function moveDown(){
  if(!current)return;
  if(valid(current.cells,current.x,current.y+1)){current.y++;score+=1;updateUI()}
  else{lockPiece(current);if(gameState==='playing')spawnNext()}
}
function hardDrop(){
  if(!current)return;const sy=current.y;
  while(valid(current.cells,current.x,current.y+1))current.y++;
  score+=(current.y-sy)*2;updateUI();
  lockPiece(current);if(gameState==='playing')spawnNext();
}
document.addEventListener('keydown',e=>{
  if(gameState!=='playing'){if(e.key==='Escape'&&gameState==='paused')togglePause();return}
  switch(e.key){
    case'ArrowLeft':case'a':moveLeft();break;case'ArrowRight':case'd':moveRight();break;
    case'ArrowDown':case's':moveDown();break;case'ArrowUp':case'w':tryRotate(current);break;
    case' ':hardDrop();break;case'Escape':case'p':togglePause();break;
  }draw();
});
document.querySelectorAll('.ctrl-btn').forEach(btn=>{
  const action=btn.dataset.action;
  const handler=e=>{e.preventDefault();e.stopPropagation();
    if(gameState!=='playing')return;
    switch(action){case'left':moveLeft();break;case'right':moveRight();break;case'down':moveDown();break;case'rotate':tryRotate(current);break;case'drop':hardDrop();break}
    draw();
  };
  btn.addEventListener('touchstart',handler,{passive:false});
  btn.addEventListener('mousedown',handler);
});
let tStartX,tStartY,tLastX,tLastY,tMoved,tStartTime;
const SWIPE_THRESH=18,MOVE_STEP=18;
const gameArea=document.getElementById('game-area');
gameArea.addEventListener('touchstart',e=>{
  if(e.target.closest('.overlay'))return;e.preventDefault();
  const t=e.touches[0];tStartX=tLastX=t.clientX;tStartY=tLastY=t.clientY;tMoved=false;tStartTime=Date.now();
},{passive:false});
gameArea.addEventListener('touchmove',e=>{
  if(e.target.closest('.overlay'))return;e.preventDefault();
  if(gameState!=='playing'||!current)return;
  const t=e.touches[0],dx=t.clientX-tLastX,totalDx=t.clientX-tStartX,totalDy=t.clientY-tStartY;
  if(Math.abs(dx)>=MOVE_STEP){
    const steps=Math.floor(Math.abs(dx)/MOVE_STEP);
    for(let i=0;i<steps;i++){dx>0?moveRight():moveLeft()}
    tLastX+=Math.sign(dx)*steps*MOVE_STEP;tMoved=true;draw();
  }
  if(totalDy>SWIPE_THRESH*2&&Math.abs(totalDy)>Math.abs(totalDx)){
    const dyFromLast=t.clientY-tLastY;
    if(dyFromLast>MOVE_STEP){moveDown();tLastY=t.clientY;tMoved=true;draw()}
  }
},{passive:false});
gameArea.addEventListener('touchend',e=>{
  if(e.target.closest('.overlay'))return;e.preventDefault();
  if(gameState!=='playing'||!current)return;
  const t=e.changedTouches[0],dx=t.clientX-tStartX,dy=t.clientY-tStartY,dt=Date.now()-tStartTime;
  if(!tMoved&&Math.abs(dx)<SWIPE_THRESH&&Math.abs(dy)<SWIPE_THRESH&&dt<300){tryRotate(current);draw()}
  else if(Math.abs(dy)>Math.abs(dx)&&dy<-40&&dt<400){hardDrop();draw()}
},{passive:false});
document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);
document.getElementById('pause-btn').addEventListener('click',togglePause);
document.getElementById('resume-btn').addEventListener('click',togglePause);
function gameLoop(time){
  if(gameState!=='playing')return;
  const dt=time-lastTime;lastTime=time;
  dropTimer+=dt;if(dropTimer>=dropInterval(level)){dropTimer-=dropInterval(level);moveDown()}
  draw();requestAnimationFrame(gameLoop);
}
sizeCanvas();board=createBoard();draw();
})();
</script>
</body>
</html>
