<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Space Invaders — OCTO Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;position:fixed;width:100%}
body{height:100%;height:100dvh;overflow:hidden;font-family:'Press Start 2P',monospace;background:#0a0a0a;color:#e0e0e0;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;overscroll-behavior:none}
canvas{display:block;width:100%;height:100%}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,15,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:5;padding:20px}
.overlay.hidden{display:none}
.overlay h2{font-size:18px;color:#ff4444;text-shadow:0 0 20px #ff4444,0 0 40px #ff4444;text-align:center}
.overlay .subtitle{font-size:8px;color:#666;text-align:center;line-height:1.8}
.overlay .final-score{font-size:12px;color:#ff0;text-shadow:0 0 10px rgba(255,255,0,.5)}
.overlay .high-score{font-size:8px;color:#888}
.start-btn{font-family:inherit;font-size:10px;padding:14px 28px;background:linear-gradient(180deg,#ff6644,#cc2200);border:none;border-radius:6px;color:#fff;cursor:pointer;font-weight:bold;box-shadow:0 0 20px rgba(255,68,68,.4);margin-top:8px}
.start-btn:active{transform:scale(.95);opacity:.9}
.exit-btn{font-family:inherit;font-size:8px;padding:8px 16px;background:none;border:1px solid #444;border-radius:6px;color:#666;cursor:pointer;margin-top:4px;text-decoration:none}
.exit-btn:active{background:#222;color:#aaa}
#pause-btn{position:fixed;top:12px;right:12px;z-index:4;width:40px;height:40px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#aaa;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
#pause-btn:active{background:rgba(255,255,255,0.15);transform:scale(.9)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="pause-btn">⏸</button>
<div class="overlay" id="start-overlay">
  <h2>🚀 SPACE INVADERS</h2>
  <div class="subtitle">Drag to move · Tap / Space for rockets<br>Auto-fire enabled · Kill invaders to earn 🚀</div>
  <button class="start-btn" id="start-btn">PLAY</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<div class="overlay hidden" id="pause-overlay">
  <h2>⏸ PAUSED</h2>
  <div class="final-score" id="pause-score"></div>
  <button class="start-btn" id="resume-btn">RESUME</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<div class="overlay hidden" id="gameover-overlay">
  <h2>GAME OVER</h2>
  <div class="final-score" id="final-score"></div>
  <div class="high-score" id="high-score"></div>
  <button class="start-btn" id="restart-btn">RETRY</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,dpr,scale;

// ── Constants ──
const ROW_COLORS=['#ff2d78','#b388ff','#ffd600','#69f0ae','#ff6e40'];
const ROW_POINTS=[50,40,30,20,10];
const PLAYER_COLOR='#00e5ff';
const BULLET_COLOR='#00e5ff';
const ENEMY_BULLET='#ff4444';
const ROCKET_COLOR='#ffd600';
const SHIELD_COLOR='#69f0ae';
const BOSS_COLOR='#ff2244';
const MAX_ROCKETS=5;
const KILLS_PER_ROCKET=5;
const LIVES_START=3;
const AUTO_FIRE_INTERVAL=300;
const BOSS_EVERY=3;

// ── Game State ──
let state='idle'; // idle, playing, paused, wavemsg, bossmsg, dead
let score=0,hiScore=0,wave=0,lives=0,rockets=0,killCount=0;
let player={x:0,y:0,w:0,h:0,speed:0};
let bullets=[],enemyBullets=[],rocketProjectiles=[];
let invaders=[],shields=[],particles=[],stars=[];
let boss=null,ufo=null;
let shakeX=0,shakeY=0,shakeDur=0;
let lastAutoFire=0,msgTimer=0,msgText='';
let invDir=1,invDropNext=false,invSpeed=0,invShootInterval=0,invShootTimer=0;
let touchId=null,touchStartX=0,playerStartX=0;
let animFrame=0;

// ── Sizing ──
function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  scale=Math.min(W/400,H/700);
  player.w=28*scale;player.h=16*scale;
  player.y=H-40*scale;
  player.speed=W*0.6;
}
window.addEventListener('resize',resize);
resize();

// ── Stars ──
function initStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*1.5+0.5,a:Math.random()});}
initStars();
window.addEventListener('resize',()=>{initStars();});

// ── HiScore ──
try{hiScore=parseInt(localStorage.getItem('spaceinvaders_hi'))||0;}catch(e){}
function saveHi(){try{localStorage.setItem('spaceinvaders_hi',hiScore);}catch(e){}}

// ── Invader setup ──
function spawnInvaders(){
  invaders=[];
  const cols=8,rows=5;
  const spacing=Math.min(38*scale,W/(cols+2));
  const invW=18*scale,invH=14*scale;
  const gridW=cols*spacing;
  const startX=(W-gridW)/2+spacing/2;
  const startY=60*scale;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    invaders.push({x:startX+c*spacing,y:startY+r*spacing*0.8,w:invW,h:invH,row:r,col:c,alive:true,hp:1});
  }
  invDir=1;invDropNext=false;
  invSpeed=(0.3+wave*0.08)*scale*60;
  invShootInterval=Math.max(400,2000-wave*150);
  invShootTimer=invShootInterval;
}

// ── Shields ──
function spawnShields(){
  shields=[];
  const count=4,sw=36*scale,sh=20*scale;
  const gap=W/(count+1);
  for(let i=0;i<count;i++){
    const sx=gap*(i+1)-sw/2;
    const sy=player.y-60*scale;
    // Each shield = grid of small blocks
    const bw=4*scale,bh=4*scale;
    const cols=Math.floor(sw/bw),rows=Math.floor(sh/bh);
    for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
      shields.push({x:sx+c*bw,y:sy+r*bh,w:bw,h:bh,alive:true});
    }
  }
}

// ── Boss ──
function spawnBoss(){
  const bw=60*scale,bh=36*scale;
  boss={x:W/2,y:60*scale,w:bw,h:bh,maxHp:20+wave*5,hp:20+wave*5,phase:1,
    dir:1,speed:1.5*scale*60,shootTimer:0,shootInterval:800,
    patternTimer:0,angle:0};
}

// ── UFO ──
function trySpawnUfo(){
  if(ufo||boss||Math.random()>0.003)return;
  ufo={x:-30*scale,y:20*scale,w:24*scale,h:10*scale,speed:2*scale*60};
}

// ── Wave management ──
function startWave(){
  wave++;bullets=[];enemyBullets=[];rocketProjectiles=[];
  if(wave>1&&wave%BOSS_EVERY===1&&wave>BOSS_EVERY){
    // After boss wave, normal wave
  }
  if(wave%BOSS_EVERY===0){
    state='bossmsg';msgText='⚠ BOSS INCOMING ⚠';msgTimer=2;
  } else {
    state='wavemsg';msgText='WAVE '+wave;msgTimer=1.5;
  }
}

function onMsgDone(){
  if(wave%BOSS_EVERY===0){
    spawnBoss();invaders=[];
  } else {
    boss=null;spawnInvaders();
  }
  spawnShields();
  state='playing';
}

// ── Start / Reset ──
function startGame(){
  score=0;wave=0;lives=LIVES_START;rockets=0;killCount=0;
  player.x=W/2;boss=null;ufo=null;
  particles=[];bullets=[];enemyBullets=[];rocketProjectiles=[];
  startWave();
}

// ── Particles ──
function addExplosion(x,y,color,count){
  for(let i=0;i<count;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=(Math.random()*3+1)*scale*60;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,maxLife:1,
      color,size:(Math.random()*3+1)*scale});
  }
}

function addRocketExplosion(x,y){
  for(let i=0;i<30;i++){
    const ang=Math.random()*Math.PI*2;
    const spd=(Math.random()*4+2)*scale*60;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,maxLife:1,
      color:Math.random()>0.5?ROCKET_COLOR:'#ff8800',size:(Math.random()*4+2)*scale});
  }
}

// ── Collision ──
function rectHit(a,b){
  return a.x-a.w/2<b.x+b.w/2&&a.x+a.w/2>b.x-b.w/2&&a.y-a.h/2<b.y+b.h/2&&a.y+a.h/2>b.y-b.h/2;
}
function pointInRect(px,py,r){
  return px>r.x-r.w/2&&px<r.x+r.w/2&&py>r.y-r.h/2&&py<r.y+r.h/2;
}

// ── Screen shake ──
function doShake(dur,mag){shakeDur=dur;shakeX=(Math.random()-0.5)*mag*scale;shakeY=(Math.random()-0.5)*mag*scale;}

// ── UPDATE ──
let lastTime=0;
function update(dt){
  animFrame++;
  // Shake decay
  if(shakeDur>0){shakeDur-=dt;if(shakeDur<=0){shakeX=0;shakeY=0;}}

  // Message timer
  if(state==='wavemsg'||state==='bossmsg'){
    msgTimer-=dt;
    if(msgTimer<=0)onMsgDone();
    return;
  }
  if(state!=='playing')return;

  // ── Player auto-fire ──
  lastAutoFire-=dt*1000;
  if(lastAutoFire<=0){
    lastAutoFire=AUTO_FIRE_INTERVAL;
    bullets.push({x:player.x,y:player.y-player.h/2,w:3*scale,h:10*scale,vy:-8*scale*60});
  }

  // ── Move bullets ──
  for(let b of bullets){b.y+=b.vy*dt;}
  bullets=bullets.filter(b=>b.y>-20&&b.y<H+20);

  for(let b of enemyBullets){b.y+=b.vy*dt;if(b.vx)b.x+=b.vx*dt;}
  enemyBullets=enemyBullets.filter(b=>b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20);

  // ── Move rockets ──
  for(let r of rocketProjectiles){
    r.y+=r.vy*dt;
    r.trail-=dt;
    if(r.trail>0){
      particles.push({x:r.x+(Math.random()-0.5)*4*scale,y:r.y+8*scale,
        vx:(Math.random()-0.5)*30*scale,vy:Math.random()*60*scale,
        life:0.4,maxLife:0.4,color:Math.random()>0.5?'#ffd600':'#ff8800',size:(Math.random()*2+1)*scale});
    }
  }
  rocketProjectiles=rocketProjectiles.filter(r=>r.y>-20);

  // ── Invader movement ──
  if(invaders.length>0){
    let aliveInv=invaders.filter(i=>i.alive);
    if(aliveInv.length>0){
      let moveX=invSpeed*invDir*dt;
      let needDrop=false;
      for(let inv of aliveInv){
        inv.x+=moveX;
        if(inv.x+inv.w/2>W-10*scale||inv.x-inv.w/2<10*scale)needDrop=true;
      }
      if(needDrop){
        invDir*=-1;
        for(let inv of aliveInv){inv.y+=12*scale;inv.x+=invSpeed*invDir*dt;}
        // Speed up slightly on each drop
        invSpeed*=1.05;
      }
      // Invader shooting
      invShootTimer-=dt*1000;
      if(invShootTimer<=0){
        invShootTimer=invShootInterval;
        // Pick random alive bottom-row invader per column
        let shooters=[];
        let cols={};
        for(let inv of aliveInv){
          if(!cols[inv.col]||inv.row>cols[inv.col].row)cols[inv.col]=inv;
        }
        shooters=Object.values(cols);
        if(shooters.length>0){
          let s=shooters[Math.floor(Math.random()*shooters.length)];
          enemyBullets.push({x:s.x,y:s.y+s.h/2,w:3*scale,h:8*scale,vy:4*scale*60});
        }
      }
      // Check if invaders reached player line
      for(let inv of aliveInv){
        if(inv.y+inv.h/2>=player.y-player.h){
          lives=0;state='dead';showGameOver();return;
        }
      }
    }
  }

  // ── Boss logic ──
  if(boss){
    boss.angle+=dt*2;
    // Movement
    if(boss.phase===1){
      boss.x+=boss.dir*boss.speed*dt;
      if(boss.x+boss.w/2>W-20*scale){boss.dir=-1;}
      if(boss.x-boss.w/2<20*scale){boss.dir=1;}
    } else {
      // Phase 2: sinusoidal
      boss.x=W/2+Math.sin(boss.angle)*W*0.35;
      boss.y=60*scale+Math.sin(boss.angle*0.7)*20*scale;
    }
    // Shooting
    boss.shootTimer-=dt*1000;
    if(boss.shootTimer<=0){
      if(boss.phase===1){
        boss.shootTimer=boss.shootInterval;
        // Aimed shot
        let dx=player.x-boss.x,dy=player.y-boss.y;
        let dist=Math.sqrt(dx*dx+dy*dy)||1;
        let spd=3.5*scale*60;
        enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,w:4*scale,h:4*scale,
          vx:dx/dist*spd,vy:dy/dist*spd});
      } else {
        boss.shootTimer=boss.shootInterval*0.6;
        // Spread shot
        for(let a=-2;a<=2;a++){
          let ang=Math.PI/2+a*0.25;
          let spd=3*scale*60;
          enemyBullets.push({x:boss.x,y:boss.y+boss.h/2,w:4*scale,h:4*scale,
            vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd});
        }
      }
    }
    // Phase switch
    if(boss.phase===1&&boss.hp<=boss.maxHp*0.5){
      boss.phase=2;boss.shootInterval=600;doShake(0.5,8);
      addExplosion(boss.x,boss.y,'#ff4444',20);
    }
  }

  // ── UFO ──
  trySpawnUfo();
  if(ufo){
    ufo.x+=ufo.speed*dt;
    if(ufo.x>W+40*scale){ufo=null;}
  }

  // ── Collision: player bullets vs invaders ──
  for(let b of bullets){
    for(let inv of invaders){
      if(!inv.alive)continue;
      if(pointInRect(b.x,b.y,inv)){
        inv.alive=false;b.y=-999;
        score+=ROW_POINTS[inv.row]*(1+Math.floor(wave/5)*0.5);
        addExplosion(inv.x,inv.y,ROW_COLORS[inv.row],8);
        killCount++;
        if(killCount>=KILLS_PER_ROCKET&&rockets<MAX_ROCKETS){rockets++;killCount=0;}
        break;
      }
    }
  }

  // ── Collision: player bullets vs boss ──
  if(boss){
    for(let b of bullets){
      if(pointInRect(b.x,b.y,boss)){
        boss.hp--;b.y=-999;
        addExplosion(b.x,b.y,'#ff8800',4);
        doShake(0.1,3);
        if(boss.hp<=0){
          score+=500*wave;
          addExplosion(boss.x,boss.y,BOSS_COLOR,40);
          doShake(0.5,10);
          rockets=Math.min(MAX_ROCKETS,rockets+2);
          boss=null;
          // Next wave
          setTimeout(()=>{if(state==='playing')startWave();},1500);
        }
      }
    }
    // Rockets vs boss
    if(boss){
      for(let r of rocketProjectiles){
        if(pointInRect(r.x,r.y,boss)){
          boss.hp-=5;
          addRocketExplosion(r.x,r.y);
          doShake(0.3,6);
          r.y=-999;
          if(boss.hp<=0){
            score+=500*wave;
            addExplosion(boss.x,boss.y,BOSS_COLOR,40);
            doShake(0.5,10);
            rockets=Math.min(MAX_ROCKETS,rockets+2);
            boss=null;
            setTimeout(()=>{if(state==='playing')startWave();},1500);
          }
        }
      }
    }
  }

  // ── Collision: rockets vs invaders (splash) ──
  for(let r of rocketProjectiles){
    let hit=false;
    for(let inv of invaders){
      if(!inv.alive)continue;
      let dx=r.x-inv.x,dy=r.y-inv.y;
      if(Math.sqrt(dx*dx+dy*dy)<30*scale){
        inv.alive=false;
        score+=ROW_POINTS[inv.row];
        addExplosion(inv.x,inv.y,ROW_COLORS[inv.row],6);
        killCount++;
        if(killCount>=KILLS_PER_ROCKET&&rockets<MAX_ROCKETS){rockets++;killCount=0;}
        hit=true;
      }
    }
    if(hit){addRocketExplosion(r.x,r.y);r.y=-999;}
  }

  // ── Collision: player bullets vs UFO ──
  if(ufo){
    for(let b of bullets){
      if(b.x>ufo.x-ufo.w/2&&b.x<ufo.x+ufo.w/2&&b.y>ufo.y-ufo.h/2&&b.y<ufo.y+ufo.h/2){
        let pts=Math.floor(Math.random()*3+1)*100;
        score+=pts;
        addExplosion(ufo.x,ufo.y,'#ff00ff',12);
        ufo=null;b.y=-999;
        break;
      }
    }
  }

  // ── Collision: bullets vs shields ──
  for(let b of bullets){
    for(let s of shields){
      if(!s.alive)continue;
      if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){s.alive=false;b.y=-999;break;}
    }
  }
  for(let b of enemyBullets){
    for(let s of shields){
      if(!s.alive)continue;
      if(b.x>s.x&&b.x<s.x+s.w&&b.y>s.y&&b.y<s.y+s.h){s.alive=false;b.y=-999;break;}
    }
  }

  // ── Collision: enemy bullets vs player ──
  for(let b of enemyBullets){
    if(b.x>player.x-player.w/2&&b.x<player.x+player.w/2&&
       b.y>player.y-player.h/2&&b.y<player.y+player.h/2){
      b.y=9999;
      playerHit();
      break;
    }
  }

  // ── Check wave cleared ──
  if(!boss&&invaders.length>0&&invaders.every(i=>!i.alive)){
    setTimeout(()=>{if(state==='playing')startWave();},1000);
    invaders=[];
  }

  // ── Particles ──
  for(let p of particles){
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    p.vx*=0.96;p.vy*=0.96;
  }
  particles=particles.filter(p=>p.life>0);
}

function playerHit(){
  lives--;
  addExplosion(player.x,player.y,PLAYER_COLOR,15);
  doShake(0.3,6);
  if(lives<=0){
    state='dead';
    setTimeout(showGameOver,800);
  }
}

function showGameOver(){
  state='dead';
  if(score>hiScore){hiScore=score;saveHi();}
  document.getElementById('final-score').textContent='SCORE: '+Math.floor(score);
  document.getElementById('high-score').textContent='BEST: '+hiScore;
  document.getElementById('gameover-overlay').classList.remove('hidden');
  document.getElementById('pause-btn').style.display='none';
}

function fireRocket(){
  if(rockets<=0||state!=='playing')return;
  rockets--;
  rocketProjectiles.push({x:player.x,y:player.y-player.h/2,w:6*scale,h:14*scale,
    vy:-6*scale*60,trail:2});
}

// ── DRAW ──
function draw(){
  ctx.save();
  ctx.translate(shakeX,shakeY);
  ctx.clearRect(-20,-20,W+40,H+40);

  // Stars
  for(let s of stars){
    let twinkle=0.5+0.5*Math.sin(animFrame*0.02+s.a*10);
    ctx.globalAlpha=twinkle*0.8;
    ctx.fillStyle='#fff';
    ctx.fillRect(s.x,s.y,s.s,s.s);
  }
  ctx.globalAlpha=1;

  if(state==='wavemsg'||state==='bossmsg'){
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=(16*scale)+'px "Press Start 2P",monospace';
    let col=state==='bossmsg'?'#ff2244':'#0ff';
    ctx.fillStyle=col;
    ctx.shadowColor=col;ctx.shadowBlur=30;
    ctx.fillText(msgText,W/2,H/2);
    ctx.shadowBlur=0;
    ctx.restore();
    // CRT
    drawCRT();
    return;
  }
  if(state!=='playing'&&state!=='dead'){ctx.restore();drawCRT();return;}

  // ── Shields ──
  ctx.shadowBlur=0;
  for(let s of shields){
    if(!s.alive)continue;
    ctx.fillStyle=SHIELD_COLOR;
    ctx.globalAlpha=0.7;
    ctx.fillRect(s.x,s.y,s.w,s.h);
  }
  ctx.globalAlpha=1;

  // ── Invaders ──
  for(let inv of invaders){
    if(!inv.alive)continue;
    let c=ROW_COLORS[inv.row];
    ctx.fillStyle=c;
    ctx.shadowColor=c;ctx.shadowBlur=8;
    // Draw invader shape
    let ix=inv.x,iy=inv.y,iw=inv.w,ih=inv.h;
    ctx.beginPath();
    // Body
    ctx.fillRect(ix-iw/2,iy-ih/2,iw,ih);
    // Eyes
    ctx.fillStyle='#0a0a0a';
    ctx.shadowBlur=0;
    let eyeS=3*scale;
    ctx.fillRect(ix-iw/4-eyeS/2,iy-ih/4,eyeS,eyeS);
    ctx.fillRect(ix+iw/4-eyeS/2,iy-ih/4,eyeS,eyeS);
    // Legs (animated)
    ctx.fillStyle=c;
    let legOff=Math.sin(animFrame*0.1)*3*scale;
    ctx.fillRect(ix-iw/2-2*scale,iy+ih/2,4*scale,4*scale+legOff);
    ctx.fillRect(ix+iw/2-2*scale,iy+ih/2,4*scale,4*scale-legOff);
  }
  ctx.shadowBlur=0;

  // ── Boss ──
  if(boss){
    let pulse=0.7+0.3*Math.sin(animFrame*0.08);
    ctx.fillStyle=BOSS_COLOR;
    ctx.shadowColor=BOSS_COLOR;ctx.shadowBlur=20*pulse;
    // Boss body - hexagonal shape
    let bx=boss.x,by=boss.y,bw=boss.w,bh=boss.h;
    ctx.beginPath();
    ctx.moveTo(bx-bw/2,by);
    ctx.lineTo(bx-bw/3,by-bh/2);
    ctx.lineTo(bx+bw/3,by-bh/2);
    ctx.lineTo(bx+bw/2,by);
    ctx.lineTo(bx+bw/3,by+bh/2);
    ctx.lineTo(bx-bw/3,by+bh/2);
    ctx.closePath();
    ctx.fill();
    // Boss eyes
    ctx.fillStyle='#fff';ctx.shadowBlur=0;
    let beS=5*scale;
    ctx.fillRect(bx-bw/5-beS/2,by-beS/2,beS,beS);
    ctx.fillRect(bx+bw/5-beS/2,by-beS/2,beS,beS);
    // Eye pupils track player
    let pdx=player.x>bx?2*scale:-2*scale;
    ctx.fillStyle='#ff0000';
    ctx.fillRect(bx-bw/5-beS/2+pdx+1*scale,by-beS/2+1*scale,beS-2*scale,beS-2*scale);
    ctx.fillRect(bx+bw/5-beS/2+pdx+1*scale,by-beS/2+1*scale,beS-2*scale,beS-2*scale);
    // Health bar
    ctx.shadowBlur=0;
    let hbW=80*scale,hbH=6*scale,hbX=bx-hbW/2,hbY=by-bh/2-14*scale;
    ctx.fillStyle='#333';ctx.fillRect(hbX,hbY,hbW,hbH);
    let hpRatio=boss.hp/boss.maxHp;
    ctx.fillStyle=hpRatio>0.5?'#69f0ae':hpRatio>0.25?'#ffd600':'#ff2d78';
    ctx.fillRect(hbX,hbY,hbW*hpRatio,hbH);
    ctx.strokeStyle='#666';ctx.lineWidth=1;ctx.strokeRect(hbX,hbY,hbW,hbH);
    // Phase indicator
    if(boss.phase===2){
      ctx.fillStyle='#ff4444';ctx.globalAlpha=0.15+0.1*Math.sin(animFrame*0.15);
      ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    }
  }

  // ── UFO ──
  if(ufo){
    ctx.fillStyle='#ff00ff';ctx.shadowColor='#ff00ff';ctx.shadowBlur=15;
    ctx.beginPath();
    ctx.ellipse(ufo.x,ufo.y,ufo.w/2,ufo.h/2,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#fff';ctx.shadowBlur=0;
    ctx.fillRect(ufo.x-3*scale,ufo.y-2*scale,6*scale,4*scale);
  }

  // ── Player ship ──
  ctx.fillStyle=PLAYER_COLOR;ctx.shadowColor=PLAYER_COLOR;ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.moveTo(player.x,player.y-player.h);
  ctx.lineTo(player.x-player.w/2,player.y);
  ctx.lineTo(player.x-player.w/4,player.y-player.h*0.2);
  ctx.lineTo(player.x+player.w/4,player.y-player.h*0.2);
  ctx.lineTo(player.x+player.w/2,player.y);
  ctx.closePath();
  ctx.fill();
  // Engine glow
  ctx.fillStyle='#00aaff';ctx.shadowColor='#00aaff';ctx.shadowBlur=8;
  let engineFlicker=3+Math.sin(animFrame*0.3)*2;
  ctx.fillRect(player.x-4*scale,player.y,8*scale,engineFlicker*scale);
  ctx.shadowBlur=0;

  // ── Bullets ──
  ctx.shadowColor=BULLET_COLOR;ctx.shadowBlur=6;
  ctx.fillStyle=BULLET_COLOR;
  for(let b of bullets)ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);

  ctx.shadowColor=ENEMY_BULLET;
  ctx.fillStyle=ENEMY_BULLET;
  for(let b of enemyBullets)ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);

  // ── Rockets ──
  ctx.shadowColor=ROCKET_COLOR;ctx.shadowBlur=10;
  ctx.fillStyle=ROCKET_COLOR;
  for(let r of rocketProjectiles){
    ctx.beginPath();
    ctx.moveTo(r.x,r.y-r.h/2);
    ctx.lineTo(r.x-r.w/2,r.y+r.h/2);
    ctx.lineTo(r.x+r.w/2,r.y+r.h/2);
    ctx.closePath();
    ctx.fill();
  }
  ctx.shadowBlur=0;

  // ── Particles ──
  for(let p of particles){
    ctx.globalAlpha=p.life/p.maxLife;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=4;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // ── HUD ──
  ctx.textAlign='left';ctx.textBaseline='top';
  ctx.font=Math.max(9,10*scale)+'px "Press Start 2P",monospace';
  ctx.fillStyle='#0ff';ctx.shadowColor='#0ff';ctx.shadowBlur=6;
  ctx.fillText('SCORE:'+Math.floor(score),8,8);
  ctx.fillStyle='#ff0';ctx.shadowColor='#ff0';
  ctx.textAlign='center';
  ctx.fillText('W'+wave,W/2,8);
  // Lives
  ctx.textAlign='right';
  ctx.fillStyle='#ff2d78';ctx.shadowColor='#ff2d78';
  let livesStr='';for(let i=0;i<lives;i++)livesStr+='♥';
  ctx.fillText(livesStr,W-8,8);
  // Rockets
  ctx.fillStyle=ROCKET_COLOR;ctx.shadowColor=ROCKET_COLOR;
  ctx.textAlign='right';
  let rktStr='🚀'+rockets;
  ctx.fillText(rktStr,W-8,8+14*scale);
  ctx.shadowBlur=0;

  ctx.restore();
  drawCRT();
}

function drawCRT(){
  // Subtle scanlines
  ctx.fillStyle='rgba(0,0,0,0.03)';
  for(let y=0;y<H;y+=3){ctx.fillRect(0,y,W,1);}
}

// ── Game Loop ──
function loop(ts){
  let dt=Math.min((ts-lastTime)/1000,0.05);
  lastTime=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// ── Input ──
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a')player.moveDir=-1;
  if(e.key==='ArrowRight'||e.key==='d')player.moveDir=1;
  if(e.key===' '||e.key==='Spacebar'){e.preventDefault();fireRocket();}
  if(e.key==='Escape'||e.key==='p'){
    if(state==='playing')pauseGame();
    else if(state==='paused')resumeGame();
  }
});
document.addEventListener('keyup',e=>{
  if((e.key==='ArrowLeft'||e.key==='a')&&player.moveDir===-1)player.moveDir=0;
  if((e.key==='ArrowRight'||e.key==='d')&&player.moveDir===1)player.moveDir=0;
});
player.moveDir=0;

// Keyboard continuous movement in update
const origUpdate=update;
const wrappedUpdate=function(dt){
  if(state==='playing'&&player.moveDir!==0){
    player.x+=player.moveDir*player.speed*dt;
    player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));
  }
  origUpdate(dt);
};
// Replace
update=wrappedUpdate;

// Touch
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(state!=='playing')return;
  if(touchId===null){
    let t=e.changedTouches[0];
    touchId=t.identifier;touchStartX=t.clientX;playerStartX=player.x;
  } else {
    // Second finger = rocket
    fireRocket();
  }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(let t of e.changedTouches){
    if(t.identifier===touchId){
      let dx=t.clientX-touchStartX;
      player.x=Math.max(player.w/2,Math.min(W-player.w/2,playerStartX+dx));
    }
  }
},{passive:false});
canvas.addEventListener('touchend',e=>{
  for(let t of e.changedTouches){
    if(t.identifier===touchId)touchId=null;
  }
},{passive:false});

// ── Pause ──
function pauseGame(){
  state='paused';
  document.getElementById('pause-score').textContent='SCORE: '+Math.floor(score);
  document.getElementById('pause-overlay').classList.remove('hidden');
}
function resumeGame(){
  state='playing';
  document.getElementById('pause-overlay').classList.add('hidden');
}

// ── UI Buttons ──
document.getElementById('start-btn').onclick=()=>{
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('pause-btn').style.display='flex';
  startGame();
};
document.getElementById('restart-btn').onclick=()=>{
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('pause-btn').style.display='flex';
  startGame();
};
document.getElementById('resume-btn').onclick=resumeGame;
document.getElementById('pause-btn').onclick=()=>{
  if(state==='playing')pauseGame();else if(state==='paused')resumeGame();
};

// ── Start loop ──
requestAnimationFrame(loop);
})();
</script>
