<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Neon Snake — ELITEA Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;position:fixed;width:100%}
body{height:100%;height:100dvh;overflow:hidden;font-family:'Press Start 2P',monospace;background:#0a0a0a;color:#e0e0e0;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;overscroll-behavior:none}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,15,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:5;padding:20px}
.overlay.hidden{display:none}
.overlay h2{font-size:18px;color:#69f0ae;text-shadow:0 0 20px #69f0ae,0 0 40px #69f0ae;text-align:center}
.overlay .subtitle{font-size:8px;color:#666;text-align:center;line-height:1.8}
.overlay .final-score{font-size:12px;color:#ff0;text-shadow:0 0 10px rgba(255,255,0,.5)}
.overlay .high-score{font-size:8px;color:#888}
.start-btn{font-family:inherit;font-size:10px;padding:14px 28px;background:linear-gradient(180deg,#69f0ae,#00c853);border:none;border-radius:6px;color:#000;cursor:pointer;font-weight:bold;box-shadow:0 0 20px rgba(105,240,174,.4);margin-top:8px}
.start-btn:active{transform:scale(.95);opacity:.9}
.exit-btn{font-family:inherit;font-size:8px;padding:8px 16px;background:none;border:1px solid #444;border-radius:6px;color:#666;cursor:pointer;margin-top:4px;text-decoration:none}
.exit-btn:active{background:#222;color:#aaa}
#pause-btn{position:fixed;top:12px;right:12px;z-index:4;width:40px;height:40px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#aaa;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
#pause-btn:active{background:rgba(255,255,255,0.15);transform:scale(.9)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="pause-btn">⏸</button>
<div class="overlay" id="start-overlay">
  <h2>🐍 NEON SNAKE</h2>
  <div class="subtitle">Swipe to steer · Arrow keys on desktop</div>
  <button class="start-btn" id="start-btn">PLAY</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<div class="overlay hidden" id="pause-overlay">
  <h2>⏸ PAUSED</h2>
  <div class="final-score" id="pause-score"></div>
  <button class="start-btn" id="resume-btn">RESUME</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<div class="overlay hidden" id="gameover-overlay">
  <h2>GAME OVER</h2>
  <div class="final-score" id="final-score"></div>
  <div class="high-score" id="high-score"></div>
  <button class="start-btn" id="restart-btn">RETRY</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,dpr;
let COLS,ROWS,CELL;
let OFFSET_X,OFFSET_Y;
const SNAKE_COLOR='#69f0ae';
const SNAKE_HEAD='#b9f6ca';
const FOOD_COLOR='#ff2d78';
const FOOD_GLOW='#ff2d78';
const GRID_COLOR='rgba(105,240,174,0.04)';
let gameState='idle';
let snake,direction,nextDirection,food;
let score,highScore,moveInterval,moveTimer;
let particles=[];
let stars=[];
function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  calcGrid();
}
function calcGrid(){
  const maxCell=Math.floor(Math.min(W,H)/20);
  CELL=Math.max(12,Math.min(maxCell,24));
  COLS=Math.floor((W-20)/CELL);
  ROWS=Math.floor((H-80)/CELL);
  if(COLS<10)COLS=10;
  if(ROWS<10)ROWS=10;
  OFFSET_X=Math.floor((W-COLS*CELL)/2);
  OFFSET_Y=Math.floor((H-ROWS*CELL)/2)+20;
}
window.addEventListener('resize',resize);
resize();
function initStars(){
  stars=[];
  for(let i=0;i<60;i++){
    stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,a:Math.random()*0.4+0.2,sp:Math.random()*0.15+0.05});
  }
}
function spawnParticles(px,py,color,count){
  for(let i=0;i<count;i++){
    particles.push({x:px,y:py,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,r:Math.random()*3+1,life:1,decay:Math.random()*0.04+0.02,color});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}
function cellToPixel(col,row){
  return{x:OFFSET_X+col*CELL+CELL/2,y:OFFSET_Y+row*CELL+CELL/2};
}
function spawnFood(){
  const occupied=new Set(snake.map(s=>s.c+','+s.r));
  let attempts=0;
  do{
    food={c:Math.floor(Math.random()*COLS),r:Math.floor(Math.random()*ROWS)};
    attempts++;
  }while(occupied.has(food.c+','+food.r)&&attempts<500);
}
function initGame(){
  const sc=Math.floor(COLS/2),sr=Math.floor(ROWS/2);
  snake=[{c:sc,r:sr},{c:sc-1,r:sr},{c:sc-2,r:sr}];
  direction={dc:1,dr:0};
  nextDirection={dc:1,dr:0};
  score=0;
  moveInterval=150;
  moveTimer=0;
  particles=[];
  highScore=+(localStorage.getItem('neonsnake_hi')||0);
  spawnFood();
  initStars();
}
function moveSnake(){
  direction=nextDirection;
  const head=snake[0];
  const nc=head.c+direction.dc;
  const nr=head.r+direction.dr;
  if(nc<0||nc>=COLS||nr<0||nr>=ROWS){gameOver();return}
  for(let i=0;i<snake.length;i++){if(snake[i].c===nc&&snake[i].r===nr){gameOver();return}}
  snake.unshift({c:nc,r:nr});
  if(nc===food.c&&nr===food.r){
    score+=10;
    const fp=cellToPixel(food.c,food.r);
    spawnParticles(fp.x,fp.y,FOOD_COLOR,12);
    spawnParticles(fp.x,fp.y,SNAKE_COLOR,6);
    spawnFood();
    if(moveInterval>60)moveInterval-=2;
  } else {snake.pop()}
}
function gameOver(){
  gameState='over';
  document.getElementById('pause-btn').style.display='none';
  const hp=cellToPixel(snake[0].c,snake[0].r);
  spawnParticles(hp.x,hp.y,'#ff0000',25);
  spawnParticles(hp.x,hp.y,'#ff6600',15);
  if(score>highScore){highScore=score;localStorage.setItem('neonsnake_hi',highScore)}
  document.getElementById('final-score').textContent='SCORE: '+score;
  document.getElementById('high-score').textContent='BEST: '+highScore;
  document.getElementById('gameover-overlay').classList.remove('hidden');
}
function startGame(){
  initGame();
  gameState='playing';
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('pause-btn').style.display='flex';
  lastFrame=performance.now();
  requestAnimationFrame(loop);
}
function pauseGame(){
  if(gameState!=='playing')return;
  gameState='paused';
  document.getElementById('pause-score').textContent='SCORE: '+score;
  document.getElementById('pause-overlay').classList.remove('hidden');
  document.getElementById('pause-btn').style.display='none';
}
function resumeGame(){
  if(gameState!=='paused')return;
  gameState='playing';
  lastFrame=performance.now();
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('pause-btn').style.display='flex';
  requestAnimationFrame(loop);
}
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0a0f1a');
  g.addColorStop(1,'#060a12');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);
  for(const s of stars){
    s.y+=s.sp;
    if(s.y>H){s.y=0;s.x=Math.random()*W}
    ctx.globalAlpha=s.a+Math.sin(Date.now()*0.002+s.x)*0.15;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawGrid(){
  ctx.strokeStyle=GRID_COLOR;
  ctx.lineWidth=0.5;
  for(let c=0;c<=COLS;c++){const x=OFFSET_X+c*CELL;ctx.beginPath();ctx.moveTo(x,OFFSET_Y);ctx.lineTo(x,OFFSET_Y+ROWS*CELL);ctx.stroke()}
  for(let r=0;r<=ROWS;r++){const y=OFFSET_Y+r*CELL;ctx.beginPath();ctx.moveTo(OFFSET_X,y);ctx.lineTo(OFFSET_X+COLS*CELL,y);ctx.stroke()}
  ctx.strokeStyle='rgba(105,240,174,0.12)';
  ctx.lineWidth=1;
  ctx.strokeRect(OFFSET_X,OFFSET_Y,COLS*CELL,ROWS*CELL);
}
function drawSnake(time){
  const pad=1;
  for(let i=snake.length-1;i>=0;i--){
    const seg=snake[i];
    const x=OFFSET_X+seg.c*CELL+pad;
    const y=OFFSET_Y+seg.r*CELL+pad;
    const sz=CELL-pad*2;
    const t=i/snake.length;
    const alpha=0.4+0.6*(1-t);
    if(i===0){
      ctx.shadowColor=SNAKE_HEAD;ctx.shadowBlur=12;
      ctx.fillStyle=SNAKE_HEAD;
      const r=sz*0.15;
      ctx.beginPath();
      ctx.moveTo(x+r,y);ctx.lineTo(x+sz-r,y);ctx.quadraticCurveTo(x+sz,y,x+sz,y+r);
      ctx.lineTo(x+sz,y+sz-r);ctx.quadraticCurveTo(x+sz,y+sz,x+sz-r,y+sz);
      ctx.lineTo(x+r,y+sz);ctx.quadraticCurveTo(x,y+sz,x,y+sz-r);
      ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='#0a0f1a';
      const eyeSize=sz*0.15;
      let e1x,e1y,e2x,e2y;
      const cx=x+sz/2,cy=y+sz/2;
      if(direction.dc===1){e1x=cx+sz*0.18;e1y=cy-sz*0.18;e2x=cx+sz*0.18;e2y=cy+sz*0.18}
      else if(direction.dc===-1){e1x=cx-sz*0.18;e1y=cy-sz*0.18;e2x=cx-sz*0.18;e2y=cy+sz*0.18}
      else if(direction.dr===-1){e1x=cx-sz*0.18;e1y=cy-sz*0.18;e2x=cx+sz*0.18;e2y=cy-sz*0.18}
      else{e1x=cx-sz*0.18;e1y=cy+sz*0.18;e2x=cx+sz*0.18;e2y=cy+sz*0.18}
      ctx.beginPath();ctx.arc(e1x,e1y,eyeSize,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(e2x,e2y,eyeSize,0,Math.PI*2);ctx.fill();
    } else {
      ctx.globalAlpha=alpha;
      ctx.shadowColor=SNAKE_COLOR;ctx.shadowBlur=i<3?8:0;
      ctx.fillStyle=SNAKE_COLOR;
      const r=sz*0.12;
      ctx.beginPath();
      ctx.moveTo(x+r,y);ctx.lineTo(x+sz-r,y);ctx.quadraticCurveTo(x+sz,y,x+sz,y+r);
      ctx.lineTo(x+sz,y+sz-r);ctx.quadraticCurveTo(x+sz,y+sz,x+sz-r,y+sz);
      ctx.lineTo(x+r,y+sz);ctx.quadraticCurveTo(x,y+sz,x,y+sz-r);
      ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
      ctx.fill();
      ctx.shadowBlur=0;
      ctx.globalAlpha=1;
    }
  }
}
function drawFood(time){
  const fp=cellToPixel(food.c,food.r);
  const pulse=1+Math.sin(time*0.005)*0.15;
  const r=CELL*0.35*pulse;
  ctx.shadowColor=FOOD_GLOW;ctx.shadowBlur=20;
  ctx.fillStyle=FOOD_COLOR;
  ctx.beginPath();ctx.arc(fp.x,fp.y,r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=10;
  ctx.fillStyle='rgba(255,45,120,0.2)';
  ctx.beginPath();ctx.arc(fp.x,fp.y,r*1.8,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.3)';
  ctx.beginPath();ctx.arc(fp.x-r*0.25,fp.y-r*0.25,r*0.25,0,Math.PI*2);ctx.fill();
}
function drawHUD(){
  ctx.fillStyle='#ffd600';
  ctx.shadowColor='#ffd600';ctx.shadowBlur=10;
  ctx.font='20px "Press Start 2P"';
  ctx.textAlign='center';
  ctx.fillText(score,W/2,OFFSET_Y-16);
  ctx.shadowBlur=0;
  ctx.fillStyle='#555';
  ctx.font='7px "Press Start 2P"';
  ctx.fillText('LEN: '+snake.length,W/2,OFFSET_Y-4);
}
let lastFrame=0;
function loop(time){
  if(gameState!=='playing')return;
  const dt=time-lastFrame;
  lastFrame=time;
  moveTimer+=dt;
  if(moveTimer>=moveInterval){
    moveTimer-=moveInterval;
    moveSnake();
    if(gameState!=='playing'){drawFrame(time);return}
  }
  drawFrame(time);
  updateParticles();
  requestAnimationFrame(loop);
}
function drawFrame(time){
  drawBG();
  drawGrid();
  drawFood(time||Date.now());
  drawSnake(time||Date.now());
  drawParticles();
  drawHUD();
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    if(gameState==='playing'){pauseGame();return}
    if(gameState==='paused'){resumeGame();return}
  }
  if(gameState!=='playing')return;
  switch(e.key){
    case'ArrowUp':case'w':if(direction.dr!==1){nextDirection={dc:0,dr:-1}}break;
    case'ArrowDown':case's':if(direction.dr!==-1){nextDirection={dc:0,dr:1}}break;
    case'ArrowLeft':case'a':if(direction.dc!==1){nextDirection={dc:-1,dr:0}}break;
    case'ArrowRight':case'd':if(direction.dc!==-1){nextDirection={dc:1,dr:0}}break;
  }
});
let touchStartX=0,touchStartY=0,touchId=null;
document.addEventListener('touchstart',e=>{
  if(e.target.closest('.overlay')||e.target.closest('#pause-btn'))return;
  e.preventDefault();
  if(gameState!=='playing')return;
  const t=e.changedTouches[0];
  touchId=t.identifier;
  touchStartX=t.clientX;
  touchStartY=t.clientY;
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(e.target.closest('.overlay')||e.target.closest('#pause-btn'))return;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',e=>{
  if(e.target.closest('.overlay')||e.target.closest('#pause-btn'))return;
  e.preventDefault();
  if(gameState!=='playing')return;
  for(const t of e.changedTouches){
    if(t.identifier===touchId){
      const dx=t.clientX-touchStartX;
      const dy=t.clientY-touchStartY;
      const absDx=Math.abs(dx),absDy=Math.abs(dy);
      if(Math.max(absDx,absDy)<15)return;
      if(absDx>absDy){
        if(dx>0&&direction.dc!==(-1)){nextDirection={dc:1,dr:0}}
        else if(dx<0&&direction.dc!==1){nextDirection={dc:-1,dr:0}}
      } else {
        if(dy>0&&direction.dr!==(-1)){nextDirection={dc:0,dr:1}}
        else if(dy<0&&direction.dr!==1){nextDirection={dc:0,dr:-1}}
      }
      touchId=null;
    }
  }
},{passive:false});
document.addEventListener('touchcancel',e=>{touchId=null},{passive:false});
document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);
document.getElementById('pause-btn').addEventListener('click',pauseGame);
document.getElementById('resume-btn').addEventListener('click',resumeGame);
resize();initStars();
(function idleDraw(){
  if(gameState!=='idle'&&gameState!=='over'&&gameState!=='paused')return;
  drawBG();
  drawGrid();
  if(gameState==='paused'||gameState==='over'){
    drawFood(Date.now());
    drawSnake(Date.now());
    drawParticles();
    drawHUD();
  }
  requestAnimationFrame(idleDraw);
})();
})();
</script>
</body>
</html>
