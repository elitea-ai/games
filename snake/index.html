<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>Neon Snake — OCTO Arcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;overflow:hidden;position:fixed;width:100%}
body{height:100%;height:100dvh;overflow:hidden;font-family:'Press Start 2P',monospace;background:#0a0a0a;color:#e0e0e0;touch-action:none;user-select:none;-webkit-user-select:none;position:fixed;width:100%;overscroll-behavior:none}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,15,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:5;padding:20px}
.overlay.hidden{display:none}
.overlay h2{font-size:18px;color:#69f0ae;text-shadow:0 0 20px #69f0ae,0 0 40px #69f0ae;text-align:center}
.overlay .subtitle{font-size:8px;color:#666;text-align:center;line-height:1.8}
.overlay .final-score{font-size:12px;color:#ff0;text-shadow:0 0 10px rgba(255,255,0,.5)}
.overlay .high-score{font-size:8px;color:#888}
.start-btn{font-family:inherit;font-size:10px;padding:14px 28px;background:linear-gradient(180deg,#69f0ae,#00c853);border:none;border-radius:6px;color:#000;cursor:pointer;font-weight:bold;box-shadow:0 0 20px rgba(105,240,174,.4);margin-top:8px}
.start-btn:active{transform:scale(.95);opacity:.9}
.exit-btn{font-family:inherit;font-size:8px;padding:8px 16px;background:none;border:1px solid #444;border-radius:6px;color:#666;cursor:pointer;margin-top:4px;text-decoration:none}
.exit-btn:active{background:#222;color:#aaa}
#pause-btn{position:fixed;top:12px;right:12px;z-index:4;width:40px;height:40px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#aaa;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;backdrop-filter:blur(4px)}
#pause-btn:active{background:rgba(255,255,255,0.15);transform:scale(.9)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="pause-btn">⏸</button>
<div class="overlay" id="start-overlay">
  <h2>🐍 NEON SNAKE</h2>
  <div class="subtitle">Swipe or arrow keys to steer<br>Eat to grow · Walls wrap around · Don't bite yourself</div>
  <button class="start-btn" id="start-btn">PLAY</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<div class="overlay hidden" id="pause-overlay">
  <h2>⏸ PAUSED</h2>
  <div class="final-score" id="pause-score"></div>
  <button class="start-btn" id="resume-btn">RESUME</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<div class="overlay hidden" id="gameover-overlay">
  <h2>GAME OVER</h2>
  <div class="final-score" id="final-score"></div>
  <div class="high-score" id="high-score"></div>
  <button class="start-btn" id="restart-btn">RETRY</button>
  <a class="exit-btn" href="../">EXIT</a>
</div>
<script>
(()=>{
'use strict';
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,dpr;
let COLS,ROWS,CELL;
let gameState='idle';
let snake,dir,nextDir,food,score,highScore,moveTimer,moveInterval;
let particles=[];
let stars=[];
let foodPulse=0;
const COLORS={
  head:'#69f0ae',body:'#00e676',bodyDark:'#00a152',
  food:'#ff2d78',foodGlow:'rgba(255,45,120,0.4)',
  grid:'rgba(255,255,255,0.03)',wall:'#1a237e'
};
function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const playH=H-70;
  const maxCell=Math.min(Math.floor(W/15),Math.floor(playH/20));
  CELL=Math.max(12,Math.min(maxCell,28));
  COLS=Math.floor((W-20)/CELL);
  ROWS=Math.floor((playH-10)/CELL);
  if(COLS%2===0)COLS--;
  if(ROWS%2===0)ROWS--;
}
window.addEventListener('resize',resize);
resize();
function initStars(){
  stars=[];
  for(let i=0;i<60;i++){
    stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,a:Math.random()*0.4+0.2,sp:Math.random()*0.2+0.05});
  }
}
initStars();
function gridX(){return(W-COLS*CELL)/2}
function gridY(){return 65}
function spawnParticles(px,py,color,count){
  for(let i=0;i<count;i++){
    particles.push({x:px,y:py,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,r:Math.random()*2.5+0.5,life:1,decay:Math.random()*0.03+0.02,color});
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;
}
function spawnFood(){
  const occupied=new Set(snake.map(s=>s.x+','+s.y));
  let fx,fy,attempts=0;
  do{
    fx=Math.floor(Math.random()*COLS);
    fy=Math.floor(Math.random()*ROWS);
    attempts++;
  }while(occupied.has(fx+','+fy)&&attempts<500);
  food={x:fx,y:fy};
}
function initGame(){
  const cx=Math.floor(COLS/2);
  const cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir={x:1,y:0};
  nextDir={x:1,y:0};
  score=0;
  moveInterval=150;
  moveTimer=0;
  particles=[];
  highScore=+(localStorage.getItem('neonsnake_hi')||0);
  spawnFood();
}
function cellCenter(cx,cy){
  const ox=gridX(),oy=gridY();
  return{x:ox+cx*CELL+CELL/2,y:oy+cy*CELL+CELL/2};
}
function moveSnake(){
  dir={...nextDir};
  const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};
  for(const s of snake){if(s.x===head.x&&s.y===head.y){gameOver();return}}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){
    score+=10;
    const c=cellCenter(food.x,food.y);
    spawnParticles(c.x,c.y,COLORS.food,12);
    spawnFood();
    moveInterval=Math.max(60,150-Math.floor(score/20)*5);
  } else {snake.pop()}
}
function gameOver(){
  gameState='over';
  document.getElementById('pause-btn').style.display='none';
  const hc=cellCenter(snake[0].x,snake[0].y);
  spawnParticles(hc.x,hc.y,'#ff0000',25);
  if(score>highScore){highScore=score;localStorage.setItem('neonsnake_hi',highScore)}
  document.getElementById('final-score').textContent='SCORE: '+score;
  document.getElementById('high-score').textContent='BEST: '+highScore;
  document.getElementById('gameover-overlay').classList.remove('hidden');
}
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#0d1117');g.addColorStop(1,'#0a0e14');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  for(const s of stars){
    s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W}
    ctx.globalAlpha=s.a+Math.sin(Date.now()*0.002+s.x)*0.15;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;
}
function drawGrid(){
  const ox=gridX(),oy=gridY();
  ctx.fillStyle='rgba(10,14,20,0.8)';
  ctx.fillRect(ox-1,oy-1,COLS*CELL+2,ROWS*CELL+2);
  ctx.shadowColor='#69f0ae';ctx.shadowBlur=8;
  ctx.strokeStyle='rgba(105,240,174,0.3)';ctx.lineWidth=1;
  ctx.strokeRect(ox-1,oy-1,COLS*CELL+2,ROWS*CELL+2);
  ctx.shadowBlur=0;
  ctx.strokeStyle=COLORS.grid;
  for(let x=0;x<=COLS;x++){ctx.beginPath();ctx.moveTo(ox+x*CELL,oy);ctx.lineTo(ox+x*CELL,oy+ROWS*CELL);ctx.stroke()}
  for(let y=0;y<=ROWS;y++){ctx.beginPath();ctx.moveTo(ox,oy+y*CELL);ctx.lineTo(ox+COLS*CELL,oy+y*CELL);ctx.stroke()}
}
function drawSnake(){
  const ox=gridX(),oy=gridY(),pad=1;
  for(let i=snake.length-1;i>=0;i--){
    const s=snake[i],x=ox+s.x*CELL+pad,y=oy+s.y*CELL+pad,sz=CELL-pad*2,t=i/snake.length;
    if(i===0){
      ctx.shadowColor=COLORS.head;ctx.shadowBlur=12;ctx.fillStyle=COLORS.head;
      ctx.beginPath();ctx.roundRect(x,y,sz,sz,4);ctx.fill();ctx.shadowBlur=0;
      const eyeR=Math.max(1.5,CELL*0.1);ctx.fillStyle='#000';
      if(dir.x===1){ctx.beginPath();ctx.arc(x+sz*0.7,y+sz*0.3,eyeR,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*0.7,y+sz*0.7,eyeR,0,Math.PI*2);ctx.fill()}
      else if(dir.x===-1){ctx.beginPath();ctx.arc(x+sz*0.3,y+sz*0.3,eyeR,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*0.3,y+sz*0.7,eyeR,0,Math.PI*2);ctx.fill()}
      else if(dir.y===-1){ctx.beginPath();ctx.arc(x+sz*0.3,y+sz*0.3,eyeR,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*0.7,y+sz*0.3,eyeR,0,Math.PI*2);ctx.fill()}
      else{ctx.beginPath();ctx.arc(x+sz*0.3,y+sz*0.7,eyeR,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(x+sz*0.7,y+sz*0.7,eyeR,0,Math.PI*2);ctx.fill()}
    } else {
      ctx.globalAlpha=1-t*0.5;ctx.shadowColor=COLORS.body;ctx.shadowBlur=4;
      ctx.fillStyle=i%2===0?COLORS.body:COLORS.bodyDark;
      ctx.beginPath();ctx.roundRect(x,y,sz,sz,3);ctx.fill();
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
  }
}
function drawFood(){
  const ox=gridX(),oy=gridY();
  foodPulse+=0.08;
  const pulse=1+Math.sin(foodPulse)*0.15;
  const cx=ox+food.x*CELL+CELL/2,cy=oy+food.y*CELL+CELL/2;
  const r=(CELL/2-2)*pulse;
  ctx.shadowColor=COLORS.food;ctx.shadowBlur=15;
  ctx.fillStyle=COLORS.food;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(cx-r*0.2,cy-r*0.2,r*0.4,0,Math.PI*2);ctx.fill();
}
function drawHUD(){
  ctx.fillStyle='#ffd600';ctx.shadowColor='#ffd600';ctx.shadowBlur=10;
  ctx.font='20px "Press Start 2P"';ctx.textAlign='center';
  ctx.fillText(score,W/2,40);ctx.shadowBlur=0;
  ctx.fillStyle='#555';ctx.font='8px "Press Start 2P"';
  ctx.fillText('LEN: '+snake.length,W/2,55);
}
let lastFrame=0;
function gameLoop(time){
  if(gameState!=='playing')return;
  const dt=time-lastFrame;lastFrame=time;
  moveTimer+=dt;
  if(moveTimer>=moveInterval){moveTimer-=moveInterval;moveSnake();if(gameState!=='playing')return}
  drawBG();drawGrid();drawFood();drawSnake();updateParticles();drawParticles();drawHUD();
  requestAnimationFrame(gameLoop);
}
function startGame(){
  resize();initGame();gameState='playing';lastFrame=performance.now();moveTimer=0;
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('pause-btn').style.display='flex';
  requestAnimationFrame(gameLoop);
}
function pauseGame(){
  if(gameState!=='playing')return;gameState='paused';
  document.getElementById('pause-score').textContent='SCORE: '+score;
  document.getElementById('pause-overlay').classList.remove('hidden');
  document.getElementById('pause-btn').style.display='none';
}
function resumeGame(){
  if(gameState!=='paused')return;gameState='playing';
  lastFrame=performance.now();moveTimer=0;
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('pause-btn').style.display='flex';
  requestAnimationFrame(gameLoop);
}
function setDir(dx,dy){
  if(dir.x===-dx&&dir.y===-dy)return;
  if(dx!==0&&dir.x===dx)return;
  if(dy!==0&&dir.y===dy)return;
  nextDir={x:dx,y:dy};
}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){if(gameState==='playing'){pauseGame();return}if(gameState==='paused'){resumeGame();return}}
  if(gameState!=='playing')return;
  switch(e.key){
    case'ArrowLeft':case'a':setDir(-1,0);break;
    case'ArrowRight':case'd':setDir(1,0);break;
    case'ArrowUp':case'w':setDir(0,-1);break;
    case'ArrowDown':case's':setDir(0,1);break;
  }
  e.preventDefault();
});
let touchStartX=0,touchStartY=0,touchId=null;
document.addEventListener('touchstart',e=>{
  if(e.target.closest('.overlay')||e.target.closest('#pause-btn'))return;
  e.preventDefault();
  if(gameState!=='playing')return;
  const t=e.changedTouches[0];touchId=t.identifier;
  touchStartX=t.clientX;touchStartY=t.clientY;
},{passive:false});
document.addEventListener('touchmove',e=>{
  if(e.target.closest('.overlay')||e.target.closest('#pause-btn'))return;
  e.preventDefault();
},{passive:false});
document.addEventListener('touchend',e=>{
  if(e.target.closest('.overlay')||e.target.closest('#pause-btn'))return;
  e.preventDefault();
  if(gameState!=='playing')return;
  for(const t of e.changedTouches){
    if(t.identifier===touchId){
      const dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;
      const absDx=Math.abs(dx),absDy=Math.abs(dy),minSwipe=20;
      if(absDx<minSwipe&&absDy<minSwipe)return;
      if(absDx>absDy){setDir(dx>0?1:-1,0)}else{setDir(0,dy>0?1:-1)}
      touchId=null;
    }
  }
},{passive:false});
document.addEventListener('touchcancel',()=>{touchId=null},{passive:false});
document.body.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);
document.getElementById('pause-btn').addEventListener('click',pauseGame);
document.getElementById('resume-btn').addEventListener('click',resumeGame);
resize();initStars();
(function idleDraw(){
  if(gameState!=='idle'&&gameState!=='over'&&gameState!=='paused')return;
  drawBG();
  if(gameState==='paused'||gameState==='over'){
    drawGrid();if(food)drawFood();drawSnake();drawParticles();drawHUD();
  }
  requestAnimationFrame(idleDraw);
})();
})();
</script>
</body>
</html>
