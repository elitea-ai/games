<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PAC-MAN | ELITEA Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;touch-action:none}
#ui{position:relative;display:flex;flex-direction:column;align-items:center}
#hud{display:flex;justify-content:space-between;width:100%;max-width:560px;padding:8px 4px;color:#fff;font-size:14px}
#hud .score{color:#FFD700}
#hud .lives{color:#FFD700}
#hud .level{color:#0ff}
canvas{display:block;image-rendering:pixelated;border:2px solid #1a1a3a;border-radius:4px}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:10;pointer-events:auto}
#overlay.hidden{display:none;pointer-events:none}
#overlay h1{font-size:36px;color:#FFD700;text-shadow:0 0 20px rgba(255,214,0,.5);margin-bottom:10px}
#overlay h2{font-size:20px;color:#fff;margin-bottom:20px}
#overlay .instructions{color:#888;font-size:13px;margin:10px 0;text-align:center;line-height:1.6}
#overlay .start-btn{background:#FFD700;color:#000;border:none;padding:12px 32px;font-size:18px;font-family:inherit;cursor:pointer;border-radius:4px;margin-top:15px}
#overlay .start-btn:hover{background:#ffe44d}
#back-btn{position:fixed;top:12px;left:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;border-radius:4px;z-index:20;text-decoration:none}
#back-btn:hover{background:rgba(255,255,255,.2)}
#touch-controls{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:15}
.dpad{display:grid;grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px 64px;gap:4px}
.dpad button{background:rgba(255,214,0,.2);border:2px solid rgba(255,214,0,.4);color:#FFD700;font-size:26px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.dpad button:active{background:rgba(255,214,0,.5)}
.dpad .empty{background:transparent;border:none}
@media(hover:none)and(pointer:coarse){#touch-controls{display:block}}
</style>
</head>
<body>
<a id="back-btn" href="../">← Arcade</a>
<div id="ui">
<div id="hud">
<span class="score">SCORE: <span id="score">0</span></span>
<span class="level">LEVEL <span id="level">1</span></span>
<span class="lives" id="lives-display">❤️❤️❤️</span>
</div>
<canvas id="game"></canvas>
<div id="overlay">
<h1>🟡 PAC-MAN</h1>
<h2>ELITEA Arcade Edition</h2>
<div class="instructions">
Arrow Keys / WASD / Swipe to move<br>
Eat all dots to clear the level<br>
Power pellets let you eat ghosts!<br>
🍒 Bonus fruit appears mid-level
</div>
<button class="start-btn" id="startBtn">START GAME</button>
</div>
</div>
<div id="touch-controls">
<div class="dpad">
<div class="empty"></div>
<button id="btn-up">▲</button>
<div class="empty"></div>
<button id="btn-left">◀</button>
<div class="empty"></div>
<button id="btn-right">▶</button>
<div class="empty"></div>
<button id="btn-down">▼</button>
<div class="empty"></div>
</div>
</div>
<script>
const C=document.getElementById('game'),X=C.getContext('2d');
const TILE=20,COLS=28,ROWS=31;
C.width=TILE*COLS;C.height=TILE*ROWS;

function scaleCanvas(){
  const maxW=window.innerWidth-16,maxH=window.innerHeight-140;
  const s=Math.min(maxW/(TILE*COLS),maxH/(TILE*ROWS),1);
  C.style.width=(TILE*COLS*s)+'px';
  C.style.height=(TILE*ROWS*s)+'px';
}
scaleCanvas();window.addEventListener('resize',scaleCanvas);

// 0=empty, 1=wall, 2=dot, 3=power pellet, 4=ghost house floor, 5=ghost door
const MAP_TEMPLATE=[
"1111111111111111111111111111",
"1222222222222112222222222221",
"1211112111112112111121111121",
"1311112111112112111121111131",
"1211112111112112111121111121",
"1222222222222222222222222221",
"1211112112111111121121111121",
"1211112112111111121121111121",
"1222222112222112222122222221",
"1111112111110110111121111111",
"0000012111110110111121000000",
"0000012110000000001121000000",
"0000012110114411001121000000",
"1111112110140041001121111111",
"0000002000140041000020000000",
"1111112110140041001121111111",
"0000012110144441001121000000",
"0000012110000000001121000000",
"0000012110111111001121000000",
"1111112110111111001121111111",
"1222222222222112222222222221",
"1211112111112112111121111121",
"1311112111112112111121111131",
"1222112222222002222222112221",
"1112112112111111121121121111",
"1112112112111111121121121111",
"1222222112222112222122222221",
"1211111111112112111111111121",
"1211111111112112111111111121",
"1222222222222222222222222221",
"1111111111111111111111111111"
];

let map,dots,score,lives,level,gameState;
let pacman,ghosts,frightTimer,frightDuration;
let dotEatCount,fruitActive,fruitTimer,fruitPos,fruitType;
let animFrame,ghostEatCombo;

const GHOST_COLORS=['#FF0000','#FFB8FF','#00FFFF','#FFB852'];
const FRUITS=['🍒','🍓','🍊','🍎','🍇','🍈','🔔','🔑'];
const FRUIT_SCORES=[100,300,500,700,1000,2000,3000,5000];

const UP=0,RIGHT=1,DOWN=2,LEFT=3,NONE=-1;
const DX=[0,1,0,-1],DY=[-1,0,1,0];

function opposite(d){return(d+2)%4;}

function initMap(){
  map=[];dots=0;
  for(let r=0;r<ROWS;r++){
    map[r]=[];
    for(let c=0;c<COLS;c++){
      let v=parseInt(MAP_TEMPLATE[r][c]);
      map[r][c]=v;
      if(v===2||v===3)dots++;
    }
  }
}

function tileAt(c,r){
  if(r<0||r>=ROWS)return 1;
  if(c<0||c>=COLS)return 0; // tunnel
  return map[r][c];
}

function isWalkable(c,r){
  let t=tileAt(c,r);
  return t!==1&&t!==5;
}

function isWalkableGhost(c,r,canUseDoor){
  if(r<0||r>=ROWS)return false;
  if(c<0||c>=COLS)return true; // tunnel
  let t=map[r][c];
  if(t===1)return false;
  if(t===5&&!canUseDoor)return false;
  return true;
}

function wrapC(c){return((c%COLS)+COLS)%COLS;}

// ==================== TILE-BASED MOVEMENT ====================
// Entities sit on integer tile coords. Each update tick they move
// a fractional amount toward the next tile. Direction changes only
// happen when centered on a tile. This prevents wall clipping.

function initGame(){
  score=0;lives=3;level=1;gameState='playing';
  ghostEatCombo=0;
  initLevel();
  updateHUD();
}

function initLevel(){
  initMap();
  frightTimer=0;
  frightDuration=Math.max(2000,8000-level*500);
  dotEatCount=0;fruitActive=false;fruitTimer=0;
  fruitPos={c:14,r:17};
  fruitType=Math.min(level-1,FRUITS.length-1);
  animFrame=0;

  // Pac-man: tile coords + sub-tile progress
  pacman={
    tileC:14,tileR:23,
    pixX:14*TILE+TILE/2,pixY:23*TILE+TILE/2,
    dir:LEFT,nextDir:LEFT,
    speed:TILE*4.5, // pixels per second (~4.5 tiles/sec)
    stopped:false
  };

  // Ghosts: tile-based with sub-pixel interpolation
  ghosts=[
    makeGhost(14,11,LEFT, 0,'#FF0000',{c:25,r:0},false),
    makeGhost(14,14,UP,   3000,'#FFB8FF',{c:2,r:0},true),
    makeGhost(12,14,UP,   6000,'#00FFFF',{c:27,r:31},true),
    makeGhost(16,14,UP,   Math.max(2000,10000-level*1000),'#FFB852',{c:0,r:31},true)
  ];
}

function makeGhost(c,r,dir,delay,color,scatter,inHouse){
  return{
    tileC:c,tileR:r,
    pixX:c*TILE+TILE/2,pixY:r*TILE+TILE/2,
    dir:dir,nextTileC:c,nextTileR:r,
    moving:false,
    mode:'scatter',
    startDelay:delay,
    color:color,
    scatterTarget:scatter,
    inHouse:inHouse,
    frightened:false,
    eaten:false,
    speed:TILE*3.5 // pixels per second (~3.5 tiles/sec)
  };
}

function ghostSpeed(g){
  if(g.eaten)return TILE*8;
  if(g.frightened)return TILE*2;
  return TILE*(3.5+level*0.08); // slight increase per level
}

function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('level').textContent=level;
  let h='';for(let i=0;i<lives;i++)h+='❤️';
  document.getElementById('lives-display').textContent=h||'💀';
}

// ==================== GHOST AI ====================
function getGhostTarget(ghost,idx){
  if(ghost.eaten)return{c:14,r:11};
  if(ghost.frightened)return{c:Math.floor(Math.random()*COLS),r:Math.floor(Math.random()*ROWS)};
  if(ghost.mode==='scatter')return ghost.scatterTarget;

  let pc=pacman.tileC,pr=pacman.tileR;
  switch(idx){
    case 0: return{c:pc,r:pr};
    case 1: return{c:pc+DX[pacman.dir]*4,r:pr+DY[pacman.dir]*4};
    case 2:{
      let ac=pc+DX[pacman.dir]*2,ar=pr+DY[pacman.dir]*2;
      return{c:ac+(ac-ghosts[0].tileC),r:ar+(ar-ghosts[0].tileR)};
    }
    case 3:{
      let d=Math.abs(ghost.tileC-pc)+Math.abs(ghost.tileR-pr);
      return d>8?{c:pc,r:pr}:ghost.scatterTarget;
    }
  }
}

function chooseGhostDir(ghost,idx){
  let target=getGhostTarget(ghost,idx);
  let bestDir=ghost.dir,bestDist=Infinity;
  let canDoor=ghost.inHouse||ghost.eaten;

  for(let d=0;d<4;d++){
    // ghosts can't reverse (unless frightened)
    if(d===opposite(ghost.dir)&&!ghost.frightened)continue;
    let nc=ghost.tileC+DX[d],nr=ghost.tileR+DY[d];
    if(!isWalkableGhost(nc,nr,canDoor))continue;
    let dc=wrapC(nc)-target.c,dr=nr-target.r;
    let dist=dc*dc+dr*dr;
    if(dist<bestDist){bestDist=dist;bestDir=d;}
  }
  return bestDir;
}

function moveEntity(e,dt){
  let speed=e===pacman?pacman.speed:ghostSpeed(e);
  let dist=speed*dt/1000;
  let dx=DX[e.dir],dy=DY[e.dir];
  let targetX=e.tileC*TILE+TILE/2+dx*TILE;
  let targetY=e.tileR*TILE+TILE/2+dy*TILE;

  // Move toward next tile
  let remX=targetX-e.pixX,remY=targetY-e.pixY;
  let rem=Math.abs(remX)+Math.abs(remY);

  if(dist>=rem){
    // Arrived at next tile
    let nc=e.tileC+dx,nr=e.tileR+dy;
    // Tunnel wrap
    if(nc<0){nc=COLS-1;e.pixX=(COLS-1)*TILE+TILE/2;targetX=e.pixX;}
    else if(nc>=COLS){nc=0;e.pixX=TILE/2;targetX=e.pixX;}
    
    e.tileC=nc;e.tileR=nr;
    e.pixX=nc*TILE+TILE/2;
    e.pixY=nr*TILE+TILE/2;
    return true; // reached tile center
  } else {
    e.pixX+=dx*dist;
    e.pixY+=dy*dist;
    return false;
  }
}

// ==================== MODE TIMER ====================
let modeTimer=0,modePhase=0;
const MODE_SCHEDULE=[7000,20000,7000,20000,5000,20000,5000];

function updateModes(dt){
  if(frightTimer>0){
    frightTimer-=dt;
    if(frightTimer<=0){
      ghosts.forEach(g=>{if(!g.eaten)g.frightened=false;});
      ghostEatCombo=0;
    }
    return;
  }
  modeTimer+=dt;
  if(modePhase<MODE_SCHEDULE.length&&modeTimer>=MODE_SCHEDULE[modePhase]){
    modeTimer=0;modePhase++;
    let mode=(modePhase%2===0)?'scatter':'chase';
    ghosts.forEach(g=>{if(!g.eaten&&!g.frightened)g.mode=mode;});
  }
}

function activateFright(){
  frightTimer=frightDuration;
  ghostEatCombo=0;
  ghosts.forEach(g=>{
    if(!g.eaten&&!g.inHouse){
      g.frightened=true;
      g.dir=opposite(g.dir);
    }
  });
}

// ==================== MAIN LOOP ====================
let lastTime=0;

function gameLoop(ts){
  if(!lastTime)lastTime=ts;
  let dt=Math.min(ts-lastTime,33); // cap at ~30fps worth of sim
  lastTime=ts;
  if(gameState==='playing'){
    update(dt);
  }
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  animFrame+=dt*0.008;
  updateModes(dt);

  // === PAC-MAN MOVEMENT ===
  // Try to turn at tile center
  let atCenter=moveEntity(pacman,dt);
  if(atCenter){
    // Try next direction first
    let nc=pacman.tileC+DX[pacman.nextDir],nr=pacman.tileR+DY[pacman.nextDir];
    if(isWalkable(nc,nr)){
      pacman.dir=pacman.nextDir;
    }
    // Check if can continue in current dir
    let fc=pacman.tileC+DX[pacman.dir],fr=pacman.tileR+DY[pacman.dir];
    if(!isWalkable(fc,fr)){
      pacman.stopped=true;
    } else {
      pacman.stopped=false;
    }
  }

  // Eat dots
  let pr=pacman.tileR,pc=pacman.tileC;
  if(pc>=0&&pc<COLS&&pr>=0&&pr<ROWS){
    if(map[pr][pc]===2){map[pr][pc]=0;score+=10;dots--;dotEatCount++;updateHUD();}
    if(map[pr][pc]===3){map[pr][pc]=0;score+=50;dots--;dotEatCount++;activateFright();updateHUD();}
  }

  // Fruit
  if(dotEatCount>=70&&!fruitActive&&fruitTimer===0){fruitActive=true;fruitTimer=10000;}
  if(fruitActive){
    fruitTimer-=dt;
    if(fruitTimer<=0){fruitActive=false;fruitTimer=-1;}
    if(pacman.tileC===fruitPos.c&&pacman.tileR===fruitPos.r){
      score+=FRUIT_SCORES[fruitType];fruitActive=false;fruitTimer=-1;updateHUD();
    }
  }

  // Level clear
  if(dots<=0){level++;initLevel();modeTimer=0;modePhase=0;updateHUD();return;}

  // === GHOST MOVEMENT ===
  ghosts.forEach((g,idx)=>{
    if(g.inHouse){
      g.startDelay-=dt;
      if(g.startDelay<=0){
        g.inHouse=false;
        g.tileC=14;g.tileR=11;
        g.pixX=14*TILE+TILE/2;g.pixY=11*TILE+TILE/2;
        g.dir=LEFT;
      }
      return;
    }

    let arrived=moveEntity(g,dt);
    if(arrived){
      // Tunnel wrap already handled in moveEntity
      // Check if eaten ghost reached home
      if(g.eaten&&g.tileC===14&&g.tileR===11){
        g.eaten=false;g.frightened=false;g.dir=LEFT;
        return;
      }
      // Choose new direction
      g.dir=chooseGhostDir(g,idx);
      
      // Check if next tile is walkable, if not stay
      let nc=g.tileC+DX[g.dir],nr=g.tileR+DY[g.dir];
      let canDoor=g.inHouse||g.eaten;
      if(!isWalkableGhost(nc,nr,canDoor)){
        // stuck - try any direction
        for(let d=0;d<4;d++){
          let tc=g.tileC+DX[d],tr=g.tileR+DY[d];
          if(isWalkableGhost(tc,tr,canDoor)){g.dir=d;break;}
        }
      }
    }
  });

  // === COLLISION CHECK ===
  ghosts.forEach(g=>{
    if(g.inHouse)return;
    let dist=Math.abs(g.pixX-pacman.pixX)+Math.abs(g.pixY-pacman.pixY);
    if(dist<TILE*0.8){
      if(g.frightened&&!g.eaten){
        g.eaten=true;g.frightened=false;
        ghostEatCombo++;
        score+=200*Math.pow(2,ghostEatCombo-1);
        updateHUD();
      } else if(!g.eaten){
        lives--;updateHUD();
        if(lives<=0){
          gameState='gameover';
          showOverlay('GAME OVER','Final Score: '+score,true);
        } else {
          resetPositions();
        }
      }
    }
  });
}

function resetPositions(){
  pacman.tileC=14;pacman.tileR=23;
  pacman.pixX=14*TILE+TILE/2;pacman.pixY=23*TILE+TILE/2;
  pacman.dir=LEFT;pacman.nextDir=LEFT;pacman.stopped=false;

  let startC=[14,14,12,16],startR=[11,14,14,14];
  let delays=[0,3000,6000,9000];
  ghosts.forEach((g,i)=>{
    g.tileC=startC[i];g.tileR=startR[i];
    g.pixX=startC[i]*TILE+TILE/2;g.pixY=startR[i]*TILE+TILE/2;
    g.dir=i===0?LEFT:UP;
    g.inHouse=i>0;g.frightened=false;g.eaten=false;
    g.startDelay=delays[i];
  });
  frightTimer=0;
}

// ==================== DRAWING ====================
function draw(){
  X.fillStyle='#000';X.fillRect(0,0,C.width,C.height);

  // Map
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      let v=map[r][c];
      let px=c*TILE,py=r*TILE;
      if(v===1){
        X.fillStyle='#1a1aff';
        X.fillRect(px+1,py+1,TILE-2,TILE-2);
        X.fillStyle='#2828ff';
        X.fillRect(px+2,py+2,TILE-4,1);
      } else if(v===5){
        X.fillStyle='#ffb8ff';
        X.fillRect(px+2,py+TILE/2-1,TILE-4,3);
      } else if(v===2){
        X.fillStyle='#ffb8ae';
        X.beginPath();X.arc(px+TILE/2,py+TILE/2,2.5,0,Math.PI*2);X.fill();
      } else if(v===3){
        let pulse=0.8+Math.sin(animFrame*0.4)*0.2;
        X.fillStyle='#ffb8ae';
        X.beginPath();X.arc(px+TILE/2,py+TILE/2,5*pulse,0,Math.PI*2);X.fill();
      }
    }
  }

  // Fruit
  if(fruitActive){
    X.font='16px serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText(FRUITS[fruitType],fruitPos.c*TILE+TILE/2,fruitPos.r*TILE+TILE/2);
  }

  // Pac-Man
  let mouth=0.15+Math.abs(Math.sin(animFrame*0.6))*0.35;
  let angles=[Math.PI*1.5,0,Math.PI*0.5,Math.PI]; // UP,RIGHT,DOWN,LEFT
  let ang=angles[pacman.dir];
  X.fillStyle='#FFD700';
  X.beginPath();
  X.arc(pacman.pixX,pacman.pixY,TILE/2-1,ang+mouth,ang+Math.PI*2-mouth);
  X.lineTo(pacman.pixX,pacman.pixY);
  X.fill();
  // Eye
  let ea=ang-0.5;
  X.fillStyle='#000';
  X.beginPath();X.arc(pacman.pixX+Math.cos(ea)*4,pacman.pixY+Math.sin(ea)*4,1.5,0,Math.PI*2);X.fill();

  // Ghosts
  ghosts.forEach(g=>{
    if(g.inHouse&&g.startDelay>0)return;
    let gx=g.pixX,gy=g.pixY;
    let color=g.eaten?'rgba(255,255,255,0.2)':
      g.frightened?(frightTimer<2000&&Math.floor(animFrame*3)%2?'#fff':'#2121ff'):g.color;

    // Body
    X.fillStyle=color;
    X.beginPath();
    X.arc(gx,gy-2,TILE/2-2,Math.PI,0);
    X.lineTo(gx+TILE/2-2,gy+TILE/2-2);
    let waveOff=Math.sin(animFrame*2)*2;
    for(let i=0;i<=3;i++){
      let wx=gx+TILE/2-2-i*(TILE-4)/3;
      let wy=gy+TILE/2-2+(i%2===0?waveOff:-waveOff);
      X.lineTo(wx,wy);
    }
    X.fill();

    // Eyes
    [-3,3].forEach(ox=>{
      X.fillStyle='#fff';
      X.beginPath();X.ellipse(gx+ox,gy-3,3,3.5,0,0,Math.PI*2);X.fill();
      if(!g.frightened||g.eaten){
        X.fillStyle='#00f';
        X.beginPath();X.arc(gx+ox+DX[g.dir]*1.5,gy-3+DY[g.dir]*1.5,1.5,0,Math.PI*2);X.fill();
      }
    });
    // Frightened mouth
    if(g.frightened&&!g.eaten){
      X.strokeStyle='#fff';X.lineWidth=1;
      X.beginPath();
      for(let i=-4;i<=4;i++){
        let sx=gx+i*1.2,sy=gy+2+(i%2?-1:1);
        i===-4?X.moveTo(sx,sy):X.lineTo(sx,sy);
      }
      X.stroke();
    }
  });
}

function showOverlay(title,sub,isGameOver){
  let o=document.getElementById('overlay');
  o.classList.remove('hidden');
  o.querySelector('h1').textContent=title;
  o.querySelector('h2').textContent=sub||'';
  document.getElementById('startBtn').textContent=isGameOver?'PLAY AGAIN':'START GAME';
}

// ==================== INPUT ====================
function setDir(d){pacman.nextDir=d;}

document.addEventListener('keydown',e=>{
  switch(e.key){
    case'ArrowUp':case'w':case'W':setDir(UP);e.preventDefault();break;
    case'ArrowDown':case's':case'S':setDir(DOWN);e.preventDefault();break;
    case'ArrowLeft':case'a':case'A':setDir(LEFT);e.preventDefault();break;
    case'ArrowRight':case'd':case'D':setDir(RIGHT);e.preventDefault();break;
  }
});

// Touch: responsive swipe with low threshold
let touchX=0,touchY=0;
document.addEventListener('touchstart',e=>{
  touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;
},{passive:true});
document.addEventListener('touchmove',e=>{
  let dx=e.touches[0].clientX-touchX,dy=e.touches[0].clientY-touchY;
  if(Math.abs(dx)+Math.abs(dy)>10){ // low threshold for responsiveness
    if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?RIGHT:LEFT);}
    else{setDir(dy>0?DOWN:UP);}
    touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;
  }
  e.preventDefault();
},{passive:false});

// D-pad buttons
const btnMap={up:UP,down:DOWN,left:LEFT,right:RIGHT};
Object.entries(btnMap).forEach(([name,dir])=>{
  let btn=document.getElementById('btn-'+name);
  if(btn){
    btn.addEventListener('touchstart',e=>{setDir(dir);e.preventDefault();},{passive:false});
    btn.addEventListener('mousedown',()=>setDir(dir));
  }
});

// ==================== START ====================
document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('overlay').classList.add('hidden');
  initGame();
  lastTime=0;modeTimer=0;modePhase=0;
  requestAnimationFrame(gameLoop);
});
</script>
