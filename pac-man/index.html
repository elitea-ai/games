<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>PAC-MAN | ELITEA Arcade</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Courier New',monospace;overflow:hidden;touch-action:none}
#ui{position:relative;display:flex;flex-direction:column;align-items:center}
#hud{display:flex;justify-content:space-between;width:100%;max-width:560px;padding:8px 4px;color:#fff;font-size:14px}
#hud .score{color:#FFD700}
#hud .lives{color:#FFD700}
#hud .level{color:#0ff}
canvas{display:block;image-rendering:pixelated;border:2px solid #1a1a3a;border-radius:4px}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);z-index:10;pointer-events:auto}
#overlay.hidden{display:none;pointer-events:none}
#overlay h1{font-size:36px;color:#FFD700;text-shadow:0 0 20px rgba(255,214,0,.5);margin-bottom:10px}
#overlay h2{font-size:20px;color:#fff;margin-bottom:20px}
#overlay .instructions{color:#888;font-size:13px;margin:10px 0;text-align:center;line-height:1.6}
#overlay .start-btn{background:#FFD700;color:#000;border:none;padding:12px 32px;font-size:18px;font-family:inherit;cursor:pointer;border-radius:4px;margin-top:15px}
#overlay .start-btn:hover{background:#ffe44d}
#back-btn{position:fixed;top:12px;left:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;border-radius:4px;z-index:20;text-decoration:none}
#back-btn:hover{background:rgba(255,255,255,.2)}
#touch-controls{display:none;position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:15}
.dpad{display:grid;grid-template-columns:64px 64px 64px;grid-template-rows:64px 64px 64px;gap:4px}
.dpad button{background:rgba(255,214,0,.2);border:2px solid rgba(255,214,0,.4);color:#FFD700;font-size:26px;border-radius:10px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.dpad button:active{background:rgba(255,214,0,.5)}
.dpad .empty{background:transparent;border:none}
@media(hover:none)and(pointer:coarse){#touch-controls{display:block}}
</style>
</head>
<body>
<a id="back-btn" href="../">← Arcade</a>
<div id="ui">
<div id="hud">
<span class="score">SCORE: <span id="score">0</span></span>
<span class="level">LEVEL <span id="level">1</span></span>
<span class="lives" id="lives-display">❤️❤️❤️</span>
</div>
<canvas id="game"></canvas>
<div id="overlay">
<h1>🟡 PAC-MAN</h1>
<h2>ELITEA Arcade Edition</h2>
<div class="instructions">
Arrow Keys / WASD / Swipe to move<br>
Eat all dots to clear the level<br>
Power pellets let you eat ghosts!<br>
🍒 Bonus fruit appears mid-level
</div>
<button class="start-btn" id="startBtn">START GAME</button>
</div>
</div>
<div id="touch-controls">
<div class="dpad">
<div class="empty"></div>
<button id="btn-up">▲</button>
<div class="empty"></div>
<button id="btn-left">◀</button>
<div class="empty"></div>
<button id="btn-right">▶</button>
<div class="empty"></div>
<button id="btn-down">▼</button>
<div class="empty"></div>
</div>
</div>
<script>
// ============================================================
//  PAC-MAN — strict tile-grid movement (no sub-pixel drift)
// ============================================================
const C = document.getElementById('game'), X = C.getContext('2d');
const T = 20, COLS = 28, ROWS = 31;
C.width = T * COLS; C.height = T * ROWS;

function scaleCanvas() {
  const mw = window.innerWidth - 16, mh = window.innerHeight - 140;
  const s = Math.min(mw / C.width, mh / C.height, 1);
  C.style.width = (C.width * s) + 'px';
  C.style.height = (C.height * s) + 'px';
}
scaleCanvas(); window.addEventListener('resize', scaleCanvas);

// --- MAP ---
// 0=empty 1=wall 2=dot 3=power 4=house-floor 5=ghost-door
const MAP_SRC = [
  "1111111111111111111111111111",
  "1222222222222112222222222221",
  "1211112111112112111112111121",
  "1311112111112112111112111131",
  "1211112111112112111112111121",
  "1222222222222222222222222221",
  "1211112121111111111212111121",
  "1211112121111111111212111121",
  "1222222122221111222212222221",
  "1111112111011001101112111111",
  "0000012111011001101112100000",
  "0000012100000000000012100000",
  "0000012101111551111012100000",
  "1111112101444444441012111111",
  "0000002001444444441002000000",
  "1111112101444444441012111111",
  "0000012101111111111012100000",
  "0000012100000000000012100000",
  "0000012101111111111012100000",
  "1111112101111111111012111111",
  "1222222222222112222222222221",
  "1211112111112112111112111121",
  "1311112111112112111112111131",
  "1222122222220000222222212221",
  "1112112121111111111212112111",
  "1112112121111111111212112111",
  "1222222122221111222212222221",
  "1211112111112112111112111121",
  "1211112111112112111112111121",
  "1222222222222222222222222221",
  "1111111111111111111111111111"
];

let map, totalDots, score, lives, level, gameState;
let pacman, ghosts, frightTimer, frightDur;
let dotEaten, fruitOn, fruitTimer, ghostCombo;
let anim = 0;

const UP = 0, RT = 1, DN = 2, LT = 3;
const DX = [0,1,0,-1], DY = [-1,0,1,0];
function opp(d) { return (d + 2) % 4; }

// --- tile helpers ---
function tile(c, r) {
  if (r < 0 || r >= ROWS) return 1;
  if (c < 0 || c >= COLS) return 0;   // tunnel row = open
  return map[r][c];
}
function walkable(c, r) {           // for pac-man
  const t = tile(c, r);
  return t !== 1 && t !== 5;
}
function gwalk(c, r, door) {        // for ghosts
  if (r < 0 || r >= ROWS) return false;
  if (c < 0 || c >= COLS) return true; // tunnel
  const t = map[r][c];
  if (t === 1) return false;
  if (t === 5 && !door) return false;
  return true;
}

// --- init ---
function buildMap() {
  map = []; totalDots = 0;
  for (let r = 0; r < ROWS; r++) {
    map[r] = [];
    for (let c = 0; c < COLS; c++) {
      const v = +MAP_SRC[r][c];
      map[r][c] = v;
      if (v === 2 || v === 3) totalDots++;
    }
  }
}

function initGame() {
  score = 0; lives = 3; level = 1; gameState = 'play';
  ghostCombo = 0;
  initLevel(); hud();
}

function initLevel() {
  buildMap();
  frightTimer = 0;
  frightDur = Math.max(2000, 8000 - level * 500);
  dotEaten = 0; fruitOn = false; fruitTimer = 0;
  anim = 0; ghostCombo = 0;
  modeTimer = 0; modePhase = 0;

  // Pac-man uses integer tile coords + fractional progress [0..1)
  pacman = { c: 14, r: 23, dir: LT, next: LT, prog: 0 };

  ghosts = [
    mkGhost(14, 11, LT, 0,    '#FF0000', 25, 0,  false),
    mkGhost(14, 14, UP, 180,   '#FFB8FF', 2,  0,  true),
    mkGhost(12, 14, UP, 360,   '#00FFFF', 27, 31, true),
    mkGhost(16, 14, UP, Math.max(120, 600 - level * 60), '#FFB852', 0, 31, true),
  ];
}

function mkGhost(c, r, dir, delay, col, sc, sr, inH) {
  return {
    c, r, dir, prog: 0, delay,
    col, scC: sc, scR: sr, inHouse: inH,
    mode: 'scatter', fright: false, eaten: false
  };
}

function hud() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  let s = ''; for (let i = 0; i < lives; i++) s += '❤️';
  document.getElementById('lives-display').textContent = s || '💀';
}

// ============================================================
//  MOVEMENT — 100 % tile-locked
//
//  Each entity has integer (c,r) = current tile, and prog in [0,1).
//  prog is how far they've moved toward tile (c+DX[dir], r+DY[dir]).
//  When prog >= 1, they arrive at the next tile:
//    - FIRST check if that next tile is walkable
//    - If yes: c/r update, prog wraps, choose new dir
//    - If no:  snap back (prog=0), stop
//  Between ticks they only interpolate visually.
// ============================================================

// ticks per second for each entity
function pacSpeed()   { return 7 + level * 0.3; }
function gSpeed(g)    {
  if (g.eaten) return 14;
  if (g.fright) return 4;
  return 5.5 + level * 0.15;
}

function movePacman(dt) {
  const spd = pacSpeed() * dt;
  // are we at a tile center? (prog === 0)
  if (pacman.prog === 0) {
    // try desired direction first
    let tryDir = pacman.next;
    let nc = pacman.c + DX[tryDir], nr = pacman.r + DY[tryDir];
    // tunnel wrap check
    if (nc < 0) nc = COLS - 1; else if (nc >= COLS) nc = 0;
    if (walkable(nc, nr)) {
      pacman.dir = tryDir;
    }
    // can we move in current dir?
    let fc = pacman.c + DX[pacman.dir], fr = pacman.r + DY[pacman.dir];
    if (fc < 0) fc = COLS - 1; else if (fc >= COLS) fc = 0;
    if (!walkable(fc, fr)) {
      return; // stopped, no movement
    }
  }
  pacman.prog += spd;
  if (pacman.prog >= 1) {
    // arrive at next tile
    let nc = pacman.c + DX[pacman.dir];
    let nr = pacman.r + DY[pacman.dir];
    // tunnel wrap
    if (nc < 0) nc = COLS - 1; else if (nc >= COLS) nc = 0;
    pacman.c = nc; pacman.r = nr;
    pacman.prog = 0;
    // consume remaining movement recursively? nah, one tile per arrival is fine
  }
}

function moveGhost(g, idx, dt) {
  if (g.inHouse) {
    g.delay -= dt * 60; // countdown in "ticks"
    if (g.delay <= 0) {
      g.inHouse = false;
      g.c = 14; g.r = 11; g.prog = 0; g.dir = LT;
    }
    return;
  }
  const spd = gSpeed(g) * dt;

  if (g.prog === 0) {
    // choose direction at tile center
    g.dir = chooseDir(g, idx);
  }
  g.prog += spd;
  if (g.prog >= 1) {
    let nc = g.c + DX[g.dir], nr = g.r + DY[g.dir];
    // tunnel
    if (nc < 0) nc = COLS - 1; else if (nc >= COLS) nc = 0;
    const canDoor = g.eaten;
    if (!gwalk(nc, nr, canDoor)) {
      // shouldn't happen if chooseDir is correct, but safety:
      g.prog = 0;
      return;
    }
    g.c = nc; g.r = nr; g.prog = 0;

    // eaten ghost arrived home?
    if (g.eaten && g.c === 14 && g.r === 11) {
      g.eaten = false; g.fright = false;
    }
  }
}

// --- Ghost AI ---
function target(g, idx) {
  if (g.eaten) return [14, 11];
  if (g.fright) return [~~(Math.random() * COLS), ~~(Math.random() * ROWS)];
  if (g.mode === 'scatter') return [g.scC, g.scR];
  const pc = pacman.c, pr = pacman.r;
  switch (idx) {
    case 0: return [pc, pr];
    case 1: return [pc + DX[pacman.dir] * 4, pr + DY[pacman.dir] * 4];
    case 2: {
      const ac = pc + DX[pacman.dir] * 2, ar = pr + DY[pacman.dir] * 2;
      return [ac + (ac - ghosts[0].c), ar + (ar - ghosts[0].r)];
    }
    case 3: {
      const d = Math.abs(g.c - pc) + Math.abs(g.r - pr);
      return d > 8 ? [pc, pr] : [g.scC, g.scR];
    }
  }
}

function chooseDir(g, idx) {
  const [tc, tr] = target(g, idx);
  const canDoor = g.eaten;
  let best = g.dir, bestD = 1e9;
  // priority: UP, LT, DN, RT (classic pac-man tie-break)
  const order = [UP, LT, DN, RT];
  for (const d of order) {
    if (d === opp(g.dir) && !g.fright) continue; // no reverse
    let nc = g.c + DX[d], nr = g.r + DY[d];
    if (nc < 0) nc = COLS - 1; else if (nc >= COLS) nc = 0;
    if (!gwalk(nc, nr, canDoor)) continue;
    const dist = (nc - tc) ** 2 + (nr - tr) ** 2;
    if (dist < bestD) { bestD = dist; best = d; }
  }
  return best;
}

// --- mode switching ---
let modeTimer = 0, modePhase = 0;
const MODES = [7000, 20000, 7000, 20000, 5000, 20000, 5000];

function updateModes(dtMs) {
  if (frightTimer > 0) {
    frightTimer -= dtMs;
    if (frightTimer <= 0) {
      ghosts.forEach(g => { if (!g.eaten) g.fright = false; });
      ghostCombo = 0;
    }
    return;
  }
  modeTimer += dtMs;
  if (modePhase < MODES.length && modeTimer >= MODES[modePhase]) {
    modeTimer = 0; modePhase++;
    const m = (modePhase % 2 === 0) ? 'scatter' : 'chase';
    ghosts.forEach(g => { if (!g.eaten && !g.fright) g.mode = m; });
  }
}

function activateFright() {
  frightTimer = frightDur; ghostCombo = 0;
  ghosts.forEach(g => {
    if (!g.eaten && !g.inHouse) {
      g.fright = true;
      g.dir = opp(g.dir);
      g.prog = 1 - g.prog; // reverse progress
    }
  });
}

// ============================================================
//  pixel position for rendering (derived from tile + prog)
// ============================================================
function px(e) {
  const bx = e.c * T + T / 2, by = e.r * T + T / 2;
  return { x: bx + DX[e.dir] * e.prog * T, y: by + DY[e.dir] * e.prog * T };
}

// ============================================================
//  GAME LOOP
// ============================================================
let lastT = 0;

function loop(ts) {
  if (!lastT) lastT = ts;
  let dtMs = Math.min(ts - lastT, 40); // cap 25fps minimum
  lastT = ts;
  if (gameState === 'play') update(dtMs);
  draw();
  requestAnimationFrame(loop);
}

function update(dtMs) {
  const dt = dtMs / 1000; // seconds
  anim += dtMs * 0.008;
  updateModes(dtMs);

  // -- pac-man --
  movePacman(dt);

  // eat dots
  const { c: pc, r: pr } = pacman;
  if (pc >= 0 && pc < COLS && pr >= 0 && pr < ROWS) {
    if (map[pr][pc] === 2) { map[pr][pc] = 0; score += 10; totalDots--; dotEaten++; hud(); }
    else if (map[pr][pc] === 3) { map[pr][pc] = 0; score += 50; totalDots--; dotEaten++; activateFright(); hud(); }
  }

  // fruit
  if (dotEaten >= 70 && !fruitOn && fruitTimer === 0) { fruitOn = true; fruitTimer = 10000; }
  if (fruitOn) {
    fruitTimer -= dtMs;
    if (fruitTimer <= 0) { fruitOn = false; fruitTimer = -1; }
    if (pc === 14 && pr === 17) {
      const fi = Math.min(level - 1, 7);
      score += [100,300,500,700,1000,2000,3000,5000][fi];
      fruitOn = false; fruitTimer = -1; hud();
    }
  }

  // level clear
  if (totalDots <= 0) { level++; initLevel(); hud(); return; }

  // -- ghosts --
  ghosts.forEach((g, i) => moveGhost(g, i, dt));

  // -- collisions (tile-distance based) --
  const pp = px(pacman);
  ghosts.forEach(g => {
    if (g.inHouse) return;
    const gp = px(g);
    const d = Math.abs(gp.x - pp.x) + Math.abs(gp.y - pp.y);
    if (d < T * 0.75) {
      if (g.fright && !g.eaten) {
        g.eaten = true; g.fright = false; ghostCombo++;
        score += 200 * (2 ** (ghostCombo - 1)); hud();
      } else if (!g.eaten) {
        lives--; hud();
        if (lives <= 0) {
          gameState = 'over';
          showOverlay('GAME OVER', 'Final Score: ' + score, true);
        } else resetPos();
      }
    }
  });
}

function resetPos() {
  pacman.c = 14; pacman.r = 23; pacman.dir = LT; pacman.next = LT; pacman.prog = 0;
  const sc = [14,14,12,16], sr = [11,14,14,14], sd = [0,180,360,540];
  ghosts.forEach((g, i) => {
    g.c = sc[i]; g.r = sr[i]; g.prog = 0;
    g.dir = i === 0 ? LT : UP;
    g.inHouse = i > 0; g.fright = false; g.eaten = false;
    g.delay = sd[i];
  });
  frightTimer = 0;
}

// ============================================================
//  DRAWING
// ============================================================
const FRUITS = ['🍒','🍓','🍊','🍎','🍇','🍈','🔔','🔑'];

function draw() {
  X.fillStyle = '#000'; X.fillRect(0, 0, C.width, C.height);

  // map
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const v = map[r][c], bx = c * T, by = r * T;
    if (v === 1) {
      X.fillStyle = '#1a1aff';
      X.fillRect(bx + 1, by + 1, T - 2, T - 2);
      X.fillStyle = '#2828ff';
      X.fillRect(bx + 2, by + 2, T - 4, 1);
    } else if (v === 5) {
      X.fillStyle = '#ffb8ff';
      X.fillRect(bx + 2, by + T / 2 - 1, T - 4, 3);
    } else if (v === 2) {
      X.fillStyle = '#ffb8ae';
      X.beginPath(); X.arc(bx + T/2, by + T/2, 2.5, 0, Math.PI*2); X.fill();
    } else if (v === 3) {
      const p = 0.8 + Math.sin(anim * 0.4) * 0.2;
      X.fillStyle = '#ffb8ae';
      X.beginPath(); X.arc(bx + T/2, by + T/2, 5 * p, 0, Math.PI*2); X.fill();
    }
  }

  // fruit
  if (fruitOn) {
    const fi = Math.min(level - 1, 7);
    X.font = '16px serif'; X.textAlign = 'center'; X.textBaseline = 'middle';
    X.fillText(FRUITS[fi], 14 * T + T/2, 17 * T + T/2);
  }

  // pac-man
  const pp = px(pacman);
  const mouth = 0.15 + Math.abs(Math.sin(anim * 0.6)) * 0.35;
  const ang = [Math.PI*1.5, 0, Math.PI*0.5, Math.PI][pacman.dir];
  X.fillStyle = '#FFD700';
  X.beginPath();
  X.arc(pp.x, pp.y, T/2 - 1, ang + mouth, ang + Math.PI*2 - mouth);
  X.lineTo(pp.x, pp.y); X.fill();
  X.fillStyle = '#000';
  X.beginPath(); X.arc(pp.x + Math.cos(ang - 0.5) * 4, pp.y + Math.sin(ang - 0.5) * 4, 1.5, 0, Math.PI*2); X.fill();

  // ghosts
  ghosts.forEach(g => {
    if (g.inHouse && g.delay > 0) return;
    const gp = px(g);
    const col = g.eaten ? 'rgba(255,255,255,0.2)' :
      g.fright ? (frightTimer < 2000 && ~~(anim*3)%2 ? '#fff' : '#2121ff') : g.col;

    X.fillStyle = col;
    X.beginPath();
    X.arc(gp.x, gp.y - 2, T/2 - 2, Math.PI, 0);
    X.lineTo(gp.x + T/2 - 2, gp.y + T/2 - 2);
    const w = Math.sin(anim * 2) * 2;
    for (let i = 0; i <= 3; i++) {
      X.lineTo(gp.x + T/2 - 2 - i * (T-4)/3, gp.y + T/2 - 2 + (i%2===0?w:-w));
    }
    X.fill();

    [-3, 3].forEach(ox => {
      X.fillStyle = '#fff';
      X.beginPath(); X.ellipse(gp.x + ox, gp.y - 3, 3, 3.5, 0, 0, Math.PI*2); X.fill();
      if (!g.fright || g.eaten) {
        X.fillStyle = '#00f';
        X.beginPath(); X.arc(gp.x + ox + DX[g.dir]*1.5, gp.y - 3 + DY[g.dir]*1.5, 1.5, 0, Math.PI*2); X.fill();
      }
    });
    if (g.fright && !g.eaten) {
      X.strokeStyle = '#fff'; X.lineWidth = 1; X.beginPath();
      for (let i = -4; i <= 4; i++) { const sx = gp.x+i*1.2, sy = gp.y+2+(i%2?-1:1); i===-4?X.moveTo(sx,sy):X.lineTo(sx,sy); }
      X.stroke();
    }
  });
}

// ============================================================
//  UI
// ============================================================
function showOverlay(t, s, go) {
  const o = document.getElementById('overlay');
  o.classList.remove('hidden');
  o.querySelector('h1').textContent = t;
  o.querySelector('h2').textContent = s || '';
  document.getElementById('startBtn').textContent = go ? 'PLAY AGAIN' : 'START GAME';
}

// ============================================================
//  INPUT
// ============================================================
function setDir(d) { pacman.next = d; }

document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W': setDir(UP); e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S': setDir(DN); e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A': setDir(LT); e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D': setDir(RT); e.preventDefault(); break;
  }
});

// Touch — low threshold, listens on whole document
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchmove', e => {
  const dx = e.touches[0].clientX - tx, dy = e.touches[0].clientY - ty;
  if (Math.abs(dx) + Math.abs(dy) > 8) {
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? RT : LT);
    else setDir(dy > 0 ? DN : UP);
    tx = e.touches[0].clientX; ty = e.touches[0].clientY;
  }
  e.preventDefault();
}, { passive: false });

// D-pad
const bmap = { up: UP, down: DN, left: LT, right: RT };
Object.entries(bmap).forEach(([n, d]) => {
  const b = document.getElementById('btn-' + n);
  if (b) {
    b.addEventListener('touchstart', e => { setDir(d); e.preventDefault(); }, { passive: false });
    b.addEventListener('mousedown', () => setDir(d));
  }
});

// Start button
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  initGame(); lastT = 0;
  requestAnimationFrame(loop);
});
</script>
</body>
</html>
